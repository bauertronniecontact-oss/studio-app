<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Admin</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="admin-shell">

  <aside class="admin-side">
    <div class="mark" id="sideMark"><span class="logo">S</span>STUDIO</div>

    <div class="side-label">Navigation</div>
    <a class="client-row active" href="/admin">Sélections</a>
    <a class="client-row" href="/admin/dashboard">Dashboard</a>
    <a class="client-row" href="/admin/templates">Templates</a>
    <a class="client-row" href="/admin/inbox">
      Boîte de réception
      <span class="c-count" id="sideInboxUnread"></span>
    </a>
    <a class="client-row" href="/admin/platform" id="sidePlatformLink" style="display:none;color:var(--accent);">
      ⚙ Plateforme (admin)
    </a>

    <div class="side-label">Clients</div>
    <div id="clientList"></div>

    <button class="btn btn-ghost btn-sm" id="newClientBtn" style="margin-top:14px;width:100%;">+ Nouveau client</button>

    <div style="margin-top:24px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-ghost btn-sm btn-with-icon" id="studioSettingsBtn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Paramètres du studio
      </button>
    </div>

    <button class="logout btn-with-icon" id="logoutBtn">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
      Se déconnecter
    </button>
  </aside>

  <main class="admin-main" id="main">
    <div style="padding:60px;text-align:center;color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;">Chargement…</div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script src="/js/admin.js"></script>
</body>
</html>
