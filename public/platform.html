<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Studio</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  html { scroll-behavior: smooth; }
  body { background: #e9e9ea; }
  .ad-shell { display: flex; gap: 18px; padding: 18px; min-height: 100vh; box-sizing: border-box; }

  /* Sidebar */
  .ad-nav { width: 230px; flex-shrink: 0; background: #fff; border-radius: 22px; padding: 26px 18px; display: flex; flex-direction: column; position: sticky; top: 18px; height: calc(100vh - 36px); }
  .ad-logo { display: flex; align-items: center; gap: 10px; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; padding: 0 8px 28px; }
  .ad-logo .lg { width: 30px; height: 30px; background: var(--ink); color: #fff; border-radius: 9px; display: grid; place-items: center; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; }
  .ad-navlist { display: flex; flex-direction: column; gap: 4px; }
  .ad-navlink { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 13px; color: var(--ink-soft); text-decoration: none; font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500; transition: background .15s, color .15s; cursor: pointer; }
  .ad-navlink svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.7; flex-shrink: 0; }
  .ad-navlink:hover { background: var(--bg-soft); color: var(--ink); }
  .ad-navlink.active { background: var(--ink); color: #fff; }
  .ad-profile { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 12px 8px 0; border-top: 1px solid var(--hairline); }
  .ad-profile .pp { width: 38px; height: 38px; border-radius: 50%; background: var(--ink); color: #fff; display: grid; place-items: center; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; }
  .ad-profile .pi { min-width: 0; }
  .ad-profile .pn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink); }
  .ad-profile .pe { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
  .ad-logout { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; margin-top: 10px; text-align: left; padding: 4px 8px; font-family: 'Inter', sans-serif; }
  .ad-logout:hover { color: #b03030; }

  /* Main */
  .ad-main { flex: 1; min-width: 0; }
  .ad-head { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; padding: 6px 4px; }
  .ad-head h1 { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 500; }
  .ad-head .sub { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Stat cards */
  .ad-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 18px; }
  @media (max-width: 1100px) { .ad-stats { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .ad-stats { grid-template-columns: repeat(2, 1fr); } }
  .ad-stat { background: #fff; border-radius: 18px; padding: 20px 18px; text-align: center; }
  .ad-stat.dark { background: var(--ink); color: #fff; }
  .ad-stat .ic { width: 42px; height: 42px; border-radius: 50%; background: var(--bg-soft); display: grid; place-items: center; margin: 0 auto 14px; }
  .ad-stat.dark .ic { background: rgba(255,255,255,0.12); }
  .ad-stat .ic svg { width: 18px; height: 18px; stroke: var(--ink); fill: none; stroke-width: 1.6; }
  .ad-stat.dark .ic svg { stroke: #fff; }
  .ad-stat .n { font-family: 'Cormorant Garamond', serif; font-size: 30px; line-height: 1; }
  .ad-stat .l { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); margin-top: 7px; letter-spacing: 0.02em; }
  .ad-stat.dark .l { color: rgba(255,255,255,0.7); }

  /* Card section */
  .ad-card { background: #fff; border-radius: 20px; padding: 22px 24px; margin-bottom: 18px; }
  .ad-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .ad-card-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 500; }
  .ad-card-head .c-sub { font-size: 12px; color: var(--muted); }
  .ad-search { width: 230px; max-width: 100%; background: var(--bg-soft); border: 1px solid transparent; padding: 9px 14px; font-size: 13px; border-radius: 11px; font-family: 'Inter', sans-serif; }
  .ad-search:focus { outline: none; border-color: var(--hairline-strong); background: #fff; }

  /* Tables */
  .ad-table { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; font-size: 13px; }
  .ad-table th { text-align: left; font-size: 11px; letter-spacing: 0.04em; color: var(--muted); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--hairline); }
  .ad-table td { padding: 13px 12px; border-bottom: 1px solid var(--hairline); vertical-align: middle; }
  .ad-table tr:last-child td { border-bottom: none; }
  .ad-table tr:hover td { background: #fafafa; }
  .ad-name { font-weight: 600; color: var(--ink); }
  .ad-email { color: var(--muted); font-size: 12px; }
  .ad-pill { display: inline-block; font-size: 11px; padding: 4px 11px; border-radius: 20px; background: var(--bg-soft); color: var(--ink-soft); font-weight: 500; }
  .ad-pill.green { background: #e8f3ec; color: #2e7d4f; }
  .ad-pill.gold { background: rgba(184,145,90,0.14); color: var(--accent); }
  .ad-pill.red { background: #fbeaea; color: #b03030; }
  .ad-pill.dark { background: var(--ink); color: #fff; }
  .ad-acts { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
  .ad-btn { font-family: 'Inter', sans-serif; font-size: 11.5px; padding: 6px 11px; border: 1px solid var(--hairline-strong); background: #fff; color: var(--ink); cursor: pointer; border-radius: 9px; transition: all .15s; white-space: nowrap; }
  .ad-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .ad-btn.dark { background: var(--ink); color: #fff; border-color: var(--ink); }
  .ad-btn.dark:hover { background: var(--accent); border-color: var(--accent); }
  .ad-btn.danger:hover { background: #b03030; border-color: #b03030; }
  .ad-stars { color: var(--accent); letter-spacing: 1px; font-size: 12px; }
  .ad-code { font-family: monospace; letter-spacing: 1px; background: var(--bg-soft); padding: 2px 7px; border-radius: 6px; font-size: 12px; }
  .ad-empty { padding: 16px; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-style: italic; }
  .ad-loading { padding: 80px; text-align: center; font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); }

  @media (max-width: 820px) {
    .ad-shell { flex-direction: column; padding: 12px; }
    .ad-nav { width: auto; height: auto; position: static; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 8px; padding: 14px; }
    .ad-logo { padding: 0 8px 0 0; }
    .ad-navlist { flex-direction: row; flex-wrap: wrap; flex: 1; }
    .ad-navlink { padding: 8px 11px; }
    .ad-navlink span { display: none; }
    .ad-profile { margin: 0; border: none; padding: 0; }
    .ad-logout { display: none; }
    .ad-table thead { display: none; }
    .ad-table td { display: block; padding: 3px 0; border: none; }
    .ad-table tr { display: block; padding: 12px 0; border-bottom: 1px solid var(--hairline-strong); }
    .ad-acts { justify-content: flex-start; margin-top: 8px; }
  }
</style>
</head>
<body>
<div id="root"><div class="ad-loading">Chargement…</div></div>

<script>
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const stars = a => { const f=Math.round(a||0); let o=''; for(let i=1;i<=5;i++) o+=`<span style="color:${i<=f?'var(--accent)':'var(--hairline-strong)'}">★</span>`; return o; };
const I = {
  dash: '<path d="M3 9.5L12 3l9 6.5"/><path d="M5 9v11h14V9"/>',
  shop: '<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/>',
  client: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/>',
  star: '<path d="M12 2l3 6.5 7 .6-5.2 4.6L18.5 21 12 17.3 5.5 21l1.7-7.3L2 9.1l7-.6z"/>',
  pulse: '<path d="M3 12h4l3 8 4-16 3 8h4"/>',
  bag: '<path d="M6 7h12l-1 13H7z"/><path d="M9 7a3 3 0 0 1 6 0"/>',
  check: '<path d="M20 6L9 17l-5-5"/>',
};

(async function(){
  const root = document.getElementById('root');
  let me;
  try { me = await fetch('/api/me').then(r => r.ok ? r.json() : null); } catch {}
  if (!me) { location.href = '/login'; return; }
  if (!me.is_admin) { root.innerHTML = '<div class="ad-loading">Accès réservé à l\'administrateur.</div>'; return; }

  let data;
  try { data = await fetch('/api/admin/overview').then(r => r.json()); }
  catch { root.innerHTML = '<div class="ad-loading">Erreur de chargement.</div>'; return; }

  const adminInit = ((me.name || me.email || 'A').trim().charAt(0) || 'A').toUpperCase();

  function render(){
    const st = data.stats;
    const statCard = (icon, n, l, dark) => `
      <div class="ad-stat ${dark?'dark':''}"><div class="ic">${svg(icon)}</div><div class="n">${n}</div><div class="l">${l}</div></div>`;
    root.innerHTML = `
      <div class="ad-shell">
        <aside class="ad-nav">
          <div class="ad-logo"><span class="lg">S</span> Admin</div>
          <nav class="ad-navlist">
            <a class="ad-navlink active" href="#sec-top">${svg(I.dash)}<span>Tableau de bord</span></a>
            <a class="ad-navlink" href="#sec-shoppers">${svg(I.shop)}<span>Stylistes</span></a>
            <a class="ad-navlink" href="#sec-clients">${svg(I.client)}<span>Clients</span></a>
            <a class="ad-navlink" href="#sec-reviews">${svg(I.star)}<span>Avis</span></a>
            <a class="ad-navlink" href="#sec-activity">${svg(I.pulse)}<span>Activité</span></a>
          </nav>
          <div class="ad-profile">
            <div class="pp">${adminInit}</div>
            <div class="pi"><div class="pn">${esc(me.name || 'Administrateur')}</div><div class="pe">${esc(me.email||'')}</div></div>
          </div>
          <button class="ad-logout" id="logoutBtn">Se déconnecter</button>
        </aside>

        <main class="ad-main" id="sec-top">
          <div class="ad-head">
            <div><h1>Tableau de bord</h1><div class="sub">Vue d'ensemble de la plateforme</div></div>
          </div>

          <div class="ad-stats">
            ${statCard(I.shop, st.shoppers, 'Stylistes')}
            ${statCard(I.check, st.public_shoppers, 'Publics')}
            ${statCard(I.client, st.clients, 'Clients', true)}
            ${statCard(I.check, st.claimed_clients, 'Clients actifs')}
            ${statCard(I.bag, st.items, 'Pièces')}
            ${statCard(I.star, st.ratings, 'Avis')}
          </div>

          <div class="ad-card" id="sec-shoppers">
            <div class="ad-card-head">
              <div><h2>Personal Shoppers</h2><div class="c-sub">${data.shoppers.length} compte${data.shoppers.length>1?'s':''}</div></div>
              <input class="ad-search" id="searchShoppers" placeholder="Rechercher un styliste…">
            </div>
            <table class="ad-table"><thead><tr>
              <th>Studio / Nom</th><th>Email</th><th>Ville</th><th>Clients</th><th>Note</th><th>Statut</th><th></th>
            </tr></thead><tbody id="shoppersBody"></tbody></table>
          </div>

          <div class="ad-card" id="sec-clients">
            <div class="ad-card-head">
              <div><h2>Clients</h2><div class="c-sub">${data.clients.length} compte${data.clients.length>1?'s':''}</div></div>
              <input class="ad-search" id="searchClients" placeholder="Rechercher un client…">
            </div>
            <table class="ad-table"><thead><tr>
              <th>Nom</th><th>Email</th><th>Styliste</th><th>Code</th><th>Statut</th><th></th>
            </tr></thead><tbody id="clientsBody"></tbody></table>
          </div>

          <div class="ad-card" id="sec-reviews">
            <div class="ad-card-head"><div><h2>Avis à modérer</h2><div class="c-sub">${(data.reviews||[]).length} avis</div></div></div>
            <div id="reviewsBody"></div>
          </div>

          <div class="ad-card" id="sec-activity">
            <div class="ad-card-head"><div><h2>Activité récente</h2><div class="c-sub">Derniers comptes créés</div></div></div>
            <div id="activityBody"></div>
          </div>
        </main>
      </div>`;

    renderShoppers(''); renderClients(''); renderReviews(); renderActivity();
    document.getElementById('searchShoppers').addEventListener('input', e => renderShoppers(e.target.value));
    document.getElementById('searchClients').addEventListener('input', e => renderClients(e.target.value));
    document.getElementById('logoutBtn').addEventListener('click', async () => { await fetch('/api/auth/logout', { method:'POST' }); location.href = '/login'; });
    // nav active au scroll
    const links = [...document.querySelectorAll('.ad-navlink')];
    document.querySelectorAll('.ad-main [id^=sec-]').forEach(sec => {
      new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) { const l = links.find(x => x.getAttribute('href') === '#'+e.target.id); if (l) { links.forEach(x=>x.classList.remove('active')); l.classList.add('active'); } } }), { rootMargin: '-20% 0px -70% 0px' }).observe(sec);
    });
  }
  function svg(p){ return `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`; }

  function fmtDate(d){ try { return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' }); } catch { return ''; } }

  function renderShoppers(q){
    q = q.trim().toLowerCase();
    const rows = data.shoppers.filter(s => !q ||
      (s.studio_name||'').toLowerCase().includes(q) || (s.name||'').toLowerCase().includes(q) ||
      (s.email||'').toLowerCase().includes(q) || (s.public_city||'').toLowerCase().includes(q));
    document.getElementById('shoppersBody').innerHTML = rows.map(s => `
      <tr data-sid="${s.id}">
        <td><span class="ad-name">${esc(s.studio_name || s.name || '—')}</span>${s.is_admin?' <span class="ad-pill dark">admin</span>':''}${s.name && s.studio_name ? `<div class="ad-email">${esc(s.name)}</div>` : ''}</td>
        <td class="ad-email">${esc(s.email||'—')}</td>
        <td>${esc(s.public_city||'—')}</td>
        <td>${s.clients_count}</td>
        <td>${s.rating_count ? `<span class="ad-stars">${stars(s.rating_avg)}</span> <span class="ad-email">${s.rating_avg.toFixed(1)} (${s.rating_count})</span>` : '<span class="ad-email">—</span>'}</td>
        <td>
          <span class="ad-pill ${s.is_public?'green':''}">${s.is_public?'Public':'Privé'}</span>
          ${s.suspended?' <span class="ad-pill red">Suspendu</span>':''}
          ${s.featured?' <span class="ad-pill gold">★</span>':''}
        </td>
        <td><div class="ad-acts">
          ${s.is_admin ? '' : `<button class="ad-btn dark" data-act="manage">Gérer</button>`}
          ${s.public_slug ? `<a class="ad-btn" href="/s/${esc(s.public_slug)}" target="_blank">Profil</a>` : ''}
          <button class="ad-btn" data-act="togglePublic">${s.is_public?'Dépublier':'Publier'}</button>
          ${s.is_admin ? '' : `<button class="ad-btn" data-act="feature">${s.featured?'Retirer ★':'★'}</button>`}
          ${s.is_admin ? '' : `<button class="ad-btn" data-act="suspend">${s.suspended?'Réactiver':'Suspendre'}</button>`}
          ${s.is_admin ? '' : `<button class="ad-btn" data-act="resetPwd">Reset MDP</button>`}
          ${s.is_admin ? '' : '<button class="ad-btn danger" data-act="delShopper">Suppr.</button>'}
        </div></td>
      </tr>`).join('') || '<tr><td colspan="7" class="ad-empty">Aucun résultat.</td></tr>';

    document.querySelectorAll('#shoppersBody tr[data-sid]').forEach(tr => {
      const id = +tr.dataset.sid;
      const s = data.shoppers.find(x => x.id === id);
      const reS = () => renderShoppers(document.getElementById('searchShoppers').value);
      tr.querySelector('[data-act=manage]')?.addEventListener('click', async () => {
        const r = await fetch(`/api/admin/impersonate/${id}`, { method: 'POST' });
        if (r.ok) location.href = '/admin'; else alert('Erreur');
      });
      tr.querySelector('[data-act=togglePublic]')?.addEventListener('click', async () => {
        const r = await fetch(`/api/admin/shopper/${id}/public`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ is_public: !s.is_public }) });
        if (r.ok) { s.is_public = !s.is_public; reS(); }
      });
      tr.querySelector('[data-act=feature]')?.addEventListener('click', async () => {
        const r = await fetch(`/api/admin/shopper/${id}/featured`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ featured: !s.featured }) });
        if (r.ok) { s.featured = !s.featured; reS(); }
      });
      tr.querySelector('[data-act=suspend]')?.addEventListener('click', async () => {
        if (!s.suspended && !confirm(`Suspendre "${s.studio_name||s.name}" ? Sa connexion sera bloquée.`)) return;
        const r = await fetch(`/api/admin/shopper/${id}/suspend`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ suspended: !s.suspended }) });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { alert(d.error||'Erreur'); return; }
        s.suspended = !s.suspended; reS();
      });
      tr.querySelector('[data-act=resetPwd]')?.addEventListener('click', async () => {
        if (!confirm(`Réinitialiser le mot de passe de "${s.studio_name||s.name}" ?`)) return;
        const r = await fetch(`/api/admin/shopper/${id}/reset-password`, { method:'POST' });
        const d = await r.json().catch(()=>({}));
        if (r.ok) prompt('Nouveau mot de passe temporaire :', d.password); else alert(d.error||'Erreur');
      });
      tr.querySelector('[data-act=delShopper]')?.addEventListener('click', async () => {
        if (!confirm(`Supprimer "${s.studio_name||s.name}" et TOUS ses clients/données ? Irréversible.`)) return;
        const r = await fetch(`/api/admin/shopper/${id}`, { method:'DELETE' });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { alert(d.error || 'Erreur'); return; }
        data.shoppers = data.shoppers.filter(x => x.id !== id);
        data.clients = data.clients.filter(c => c.shopper_id !== id);
        render();
      });
    });
  }

  function renderClients(q){
    q = q.trim().toLowerCase();
    const rows = data.clients.filter(c => !q ||
      (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) ||
      (c.shopper_name||'').toLowerCase().includes(q));
    document.getElementById('clientsBody').innerHTML = rows.map(c => `
      <tr data-cid="${c.id}">
        <td><span class="ad-name">${esc(c.name||'—')}</span></td>
        <td class="ad-email">${esc(c.email||'—')}</td>
        <td>${esc(c.shopper_name)}</td>
        <td><span class="ad-code">${esc(c.access_code||'—')}</span></td>
        <td><span class="ad-pill ${c.claimed?'green':''}">${c.claimed?'Actif':'En attente'}</span>${c.suspended?' <span class="ad-pill red">Suspendu</span>':''}</td>
        <td><div class="ad-acts">
          <a class="ad-btn" href="/c/${esc(c.slug)}?code=${esc(c.access_code||'')}" target="_blank">Espace</a>
          <button class="ad-btn" data-act="magic">Lien</button>
          <button class="ad-btn" data-act="suspendC">${c.suspended?'Réactiver':'Suspendre'}</button>
          <button class="ad-btn danger" data-act="delClient">Suppr.</button>
        </div></td>
      </tr>`).join('') || '<tr><td colspan="6" class="ad-empty">Aucun résultat.</td></tr>';

    document.querySelectorAll('#clientsBody tr[data-cid]').forEach(tr => {
      const id = +tr.dataset.cid;
      const c = data.clients.find(x => x.id === id);
      const reC = () => renderClients(document.getElementById('searchClients').value);
      tr.querySelector('[data-act=magic]')?.addEventListener('click', async () => {
        const r = await fetch(`/api/admin/client/${id}/magic-link`, { method:'POST' });
        const d = await r.json().catch(()=>({}));
        if (r.ok) prompt('Nouveau lien d\'accès pour ce client :', d.magic_url); else alert(d.error||'Erreur');
      });
      tr.querySelector('[data-act=suspendC]')?.addEventListener('click', async () => {
        const r = await fetch(`/api/admin/client/${id}/suspend`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ suspended: !c.suspended }) });
        if (r.ok) { c.suspended = !c.suspended; reC(); }
      });
      tr.querySelector('[data-act=delClient]')?.addEventListener('click', async () => {
        if (!confirm(`Supprimer le client "${c.name}" et ses données ? Irréversible.`)) return;
        const r = await fetch(`/api/admin/client/${id}`, { method:'DELETE' });
        if (r.ok) { data.clients = data.clients.filter(x => x.id !== id); render(); }
      });
    });
  }

  function renderReviews(){
    const el = document.getElementById('reviewsBody');
    const rs = data.reviews || [];
    if (!rs.length) { el.innerHTML = '<div class="ad-empty">Aucun avis pour le moment.</div>'; return; }
    el.innerHTML = rs.map(r => `
      <div data-rid="${r.id}" style="display:flex;gap:14px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--hairline);">
        <div class="ad-stars" style="white-space:nowrap;">${stars(r.stars)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);">"${esc(r.review)}"</div>
          <div class="ad-email" style="margin-top:3px;">${esc(r.client_name)} → ${esc(r.shopper_name)} · ${fmtDate(r.created_at)}</div>
        </div>
        <button class="ad-btn danger" data-act="delReview">Supprimer</button>
      </div>`).join('');
    el.querySelectorAll('[data-rid]').forEach(row => {
      row.querySelector('[data-act=delReview]').addEventListener('click', async () => {
        if (!confirm('Supprimer cet avis ?')) return;
        const r = await fetch(`/api/admin/rating/${row.dataset.rid}`, { method:'DELETE' });
        if (r.ok) { data.reviews = data.reviews.filter(x => x.id != row.dataset.rid); renderReviews(); }
      });
    });
  }

  function renderActivity(){
    const el = document.getElementById('activityBody');
    const items = [
      ...data.shoppers.map(s => ({ t:'Styliste', name: s.studio_name||s.name||s.email, at: s.created_at })),
      ...data.clients.map(c => ({ t:'Client', name: c.name + ' (' + c.shopper_name + ')', at: c.created_at })),
    ].filter(x => x.at).sort((a,b) => new Date(b.at) - new Date(a.at)).slice(0, 12);
    if (!items.length) { el.innerHTML = '<div class="ad-empty">—</div>'; return; }
    el.innerHTML = items.map(i => `
      <div style="display:flex;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--hairline);font-size:13px;">
        <span class="ad-pill">${i.t}</span>
        <span class="ad-name" style="flex:1;">${esc(i.name)}</span>
        <span class="ad-email">${fmtDate(i.at)}</span>
      </div>`).join('');
  }

  render();
})();
</script>
</body>
</html>
