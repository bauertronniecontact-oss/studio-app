<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Administration — Studio</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #e9e9ea; font-family: 'Inter', system-ui, sans-serif; color: #111; }
  .serif { font-family: 'Cormorant Garamond', Georgia, serif; }
  a { text-decoration: none; }

  .shell { display: grid; grid-template-columns: 230px 1fr; gap: 18px; padding: 18px; align-items: start; }
  @media (max-width: 820px) { .shell { grid-template-columns: 1fr; } }

  .side { background: #fff; border-radius: 20px; padding: 24px 16px; }
  .side .logo { display: flex; align-items: center; gap: 10px; font-size: 21px; font-weight: 500; padding: 0 6px 24px; }
  .side .logo .lg { width: 30px; height: 30px; background: #111; color: #fff; border-radius: 9px; display: grid; place-items: center; font-size: 14px; font-weight: 700; }
  .nav a { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 12px; color: #555; font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .nav a:hover { background: #f3f2f0; color: #111; }
  .nav a.on { background: #111; color: #fff; }
  .side .prof { margin-top: 22px; padding-top: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
  .side .prof .pp { width: 36px; height: 36px; border-radius: 50%; background: #111; color: #fff; display: grid; place-items: center; font-weight: 700; }
  .side .prof .pn { font-size: 13px; font-weight: 600; }
  .side .prof .pe { font-size: 11px; color: #999; }
  .side .out { background: none; border: none; color: #999; cursor: pointer; font-size: 12px; margin-top: 14px; padding: 4px 6px; }
  .side .out:hover { color: #b03030; }

  .main { min-width: 0; }
  .h1 { font-size: 30px; font-weight: 500; margin: 4px 0 2px; }
  .h1s { font-size: 13px; color: #999; margin-bottom: 20px; }

  .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 18px; }
  @media (max-width: 1100px) { .stats { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: #fff; border-radius: 18px; padding: 20px; text-align: center; }
  .stat.dark { background: #111; color: #fff; }
  .stat .ic { width: 44px; height: 44px; border-radius: 50%; background: #f3f2f0; display: grid; place-items: center; margin: 0 auto 13px; }
  .stat .ic svg { width: 18px; height: 18px; stroke: #111; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .stat.dark .ic { background: rgba(255,255,255,.14); }
  .stat.dark .ic svg { stroke: #fff; }
  .stat .n { font-size: 30px; line-height: 1; font-weight: 500; }
  .stat .l { font-size: 11px; color: #999; margin-top: 8px; }
  .stat.dark .l { color: rgba(255,255,255,.65); }
  .stat.clk { cursor: pointer; transition: transform .12s, box-shadow .15s; }
  .stat.clk:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.07); }

  .nav a svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  .grid2 { display: grid; grid-template-columns: 1.6fr 1fr; gap: 18px; }
  @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
  .chart { display: flex; align-items: flex-end; gap: 7px; height: 190px; padding: 16px 4px 0; }
  .chart .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; height: 100%; justify-content: flex-end; }
  .chart .bar { width: 70%; max-width: 26px; background: #111; border-radius: 5px 5px 0 0; min-height: 3px; transition: background .15s; }
  .chart .col:hover .bar { background: #b8915a; }
  .chart .bl { font-size: 10px; color: #999; }
  .pend .pi { display: flex; align-items: center; gap: 11px; padding: 11px 0; border-bottom: 1px solid #f0f0f0; }
  .pend .pi:last-child { border: none; }
  .pend .pa { width: 34px; height: 34px; border-radius: 50%; background: #f3f2f0; display: grid; place-items: center; font-weight: 700; font-size: 13px; color: #555; flex-shrink: 0; }
  .pend .pn { font-size: 13px; font-weight: 600; }
  .pend .pe2 { font-size: 11px; color: #999; }
  .topbtns { display: flex; gap: 8px; }
  .b.exp { display: inline-flex; align-items: center; gap: 6px; }

  /* graphique 2 séries */
  .chart .col .pair { display: flex; gap: 3px; align-items: flex-end; height: 100%; }
  .chart .bar2 { width: 9px; border-radius: 4px 4px 0 0; min-height: 3px; background: #ddd; }
  .chart .bar2.s { background: #111; }
  .legend { display: flex; gap: 16px; font-size: 11px; color: #999; margin-top: 6px; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }

  /* Pro / revenus */
  .pro-mrr { font-size: 34px; font-weight: 500; }
  .pro-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .pro-row:last-child { border: none; }

  /* classement */
  .lead { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid #f0f0f0; }
  .lead:last-child { border: none; }
  .lead .rk { width: 24px; height: 24px; border-radius: 50%; background: #f3f2f0; display: grid; place-items: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .lead .rk.g1 { background: #b8915a; color: #fff; }
  .lead .ln { flex: 1; font-size: 13px; font-weight: 600; min-width: 0; }
  .lead .lv { font-size: 12px; color: #999; }

  /* anneaux (donuts) */
  .donuts { display: flex; gap: 20px; flex-wrap: wrap; }
  .donut { text-align: center; }
  .donut svg { width: 90px; height: 90px; transform: rotate(-90deg); }
  .donut .dc { font-size: 11px; color: #999; margin-top: 6px; }
  .citybar { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 0; }
  .citybar .cn { width: 80px; color: #555; }
  .citybar .ct { flex: 1; height: 7px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
  .citybar .ct i { display: block; height: 100%; background: #111; }

  /* alertes */
  .alert { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .alert:last-child { border: none; }
  .alert .ab { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .alert .ab.r { background: #b03030; } .alert .ab.o { background: #d08a30; } .alert .ab.b { background: #4a7; }
  .alert .at { flex: 1; }
  .alert .an { font-weight: 700; }

  .card { background: #fff; border-radius: 20px; padding: 22px 22px; margin-bottom: 18px; }
  .card .ch { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .card .ch h2 { font-size: 20px; font-weight: 500; margin: 0; }
  .card .ch .cs { font-size: 12px; color: #999; }
  .search { background: #f3f2f0; border: 1px solid transparent; padding: 9px 13px; border-radius: 11px; font-size: 13px; width: 220px; max-width: 100%; }
  .search:focus { outline: none; background: #fff; border-color: #ddd; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; color: #999; font-weight: 500; padding: 9px 10px; border-bottom: 1px solid #eee; }
  td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .nm { font-weight: 600; }
  .em { color: #999; font-size: 12px; }
  .pill { display: inline-block; font-size: 11px; padding: 4px 10px; border-radius: 18px; background: #f3f2f0; color: #555; }
  .pill.green { background: #e8f3ec; color: #2e7d4f; }
  .pill.gold { background: rgba(184,145,90,.15); color: #b8915a; }
  .pill.red { background: #fbeaea; color: #b03030; }
  .pill.dark { background: #111; color: #fff; }
  .acts { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
  .b { font-size: 11.5px; padding: 6px 11px; border: 1px solid #ddd; background: #fff; color: #111; cursor: pointer; border-radius: 9px; white-space: nowrap; }
  .b:hover { background: #b8915a; color: #fff; border-color: #b8915a; }
  .b.k { background: #111; color: #fff; border-color: #111; }
  .b.k:hover { background: #b8915a; border-color: #b8915a; }
  .b.d:hover { background: #b03030; border-color: #b03030; }
  .stars { color: #b8915a; letter-spacing: 1px; }
  .code { font-family: monospace; background: #f3f2f0; padding: 2px 7px; border-radius: 6px; }
  .row { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .empty { color: #999; font-style: italic; padding: 16px; }
  .center { text-align: center; padding: 80px; color: #999; font-style: italic; }
  @media (max-width: 700px) { thead { display: none; } td { display: block; padding: 3px 0; border: none; } tr { display: block; padding: 12px 0; border-bottom: 1px solid #ddd; } .acts { justify-content: flex-start; margin-top: 8px; } }
</style>
</head>
<body>
<div id="root"><div class="center">Chargement…</div></div>

<script>
var esc = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
var stars = function(a){ var f=Math.round(a||0),o=''; for(var i=1;i<=5;i++) o+='<span style="color:'+(i<=f?'#b8915a':'#ccc')+'">★</span>'; return o; };
var fdate = function(d){ try { return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return ''; } };
var svg = function(p){ return '<svg viewBox="0 0 24 24">'+p+'</svg>'; };
var IC = {
  dash: '<path d="M3 9.5L12 3l9 6.5"/><path d="M5 9v11h14V9"/>',
  shop: '<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/>',
  cli:  '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/>',
  rev:  '<path d="M12 2l3 6.5 7 .6-5.2 4.6L18.5 21 12 17.3 5.5 21l1.7-7.3L2 9.1l7-.6z"/>',
  act:  '<path d="M3 12h4l3 8 4-16 3 8h4"/>',
  bag:  '<path d="M6 7h12l-1 13H7z"/><path d="M9 7a3 3 0 0 1 6 0"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  exp:  '<path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 19h16"/>'
};

(function(){
  var root = document.getElementById('root');
  var DATA = null, ME = null, qs = '', qc = '', view = 'dash', dashSel = 'shop';

  fetch('/api/me').then(function(r){ return r.ok ? r.json() : null; }).then(function(me){
    if (!me) { location.href = '/login'; return; }
    ME = me;
    if (!me.is_admin) { root.innerHTML = '<div class="center">Accès réservé à l\'administrateur.<br><br><a href="/admin">← Retour</a></div>'; return; }
    return fetch('/api/admin/overview').then(function(r){ return r.json(); }).then(function(d){ DATA = d; draw(); });
  }).catch(function(e){ root.innerHTML = '<div class="center">Erreur : ' + esc(e && e.message) + '</div>'; });

  function shopRows(){
    var q = qs.toLowerCase();
    var rows = DATA.shoppers.filter(function(s){ return !q || (s.studio_name||'').toLowerCase().indexOf(q)>=0 || (s.name||'').toLowerCase().indexOf(q)>=0 || (s.email||'').toLowerCase().indexOf(q)>=0; });
    if (!rows.length) return '<tr><td colspan="7" class="empty">Aucun résultat.</td></tr>';
    return rows.map(function(s){
      var rt = s.rating_count ? '<span class="stars">'+stars(s.rating_avg)+'</span> <span class="em">'+s.rating_avg.toFixed(1)+'</span>' : '<span class="em">—</span>';
      var st = '<span class="pill '+(s.is_public?'green':'')+'">'+(s.is_public?'Public':'Privé')+'</span>' + (s.plan==='pro'?' <span class="pill gold">PRO</span>':'') + (s.suspended?' <span class="pill red">Suspendu</span>':'') + (s.featured?' <span class="pill gold">★</span>':'');
      var acts = s.is_admin ? '' :
        '<button class="b k" data-a="manage" data-id="'+s.id+'">Gérer</button>' +
        (s.public_slug?'<a class="b" href="/s/'+esc(s.public_slug)+'" target="_blank">Profil</a>':'') +
        '<button class="b" data-a="pub" data-id="'+s.id+'">'+(s.is_public?'Dépublier':'Publier')+'</button>' +
        '<button class="b" data-a="plan" data-id="'+s.id+'">'+(s.plan==='pro'?'Repasser gratuit':'Passer Pro')+'</button>' +
        '<button class="b" data-a="feat" data-id="'+s.id+'">'+(s.featured?'Retirer ★':'★')+'</button>' +
        '<button class="b" data-a="susp" data-id="'+s.id+'">'+(s.suspended?'Réactiver':'Suspendre')+'</button>' +
        '<button class="b" data-a="pwd" data-id="'+s.id+'">Reset</button>' +
        '<button class="b d" data-a="delS" data-id="'+s.id+'">Suppr.</button>';
      return '<tr><td><span class="nm">'+esc(s.studio_name||s.name||'—')+'</span>'+(s.is_admin?' <span class="pill dark">admin</span>':'')+'</td>' +
        '<td class="em">'+esc(s.email||'—')+'</td><td>'+esc(s.public_city||'—')+'</td><td>'+s.clients_count+'</td><td>'+rt+'</td><td>'+st+'</td><td><div class="acts">'+acts+'</div></td></tr>';
    }).join('');
  }
  function cliRows(){
    var q = qc.toLowerCase();
    var rows = DATA.clients.filter(function(c){ return !q || (c.name||'').toLowerCase().indexOf(q)>=0 || (c.email||'').toLowerCase().indexOf(q)>=0 || (c.shopper_name||'').toLowerCase().indexOf(q)>=0; });
    if (!rows.length) return '<tr><td colspan="6" class="empty">Aucun résultat.</td></tr>';
    return rows.map(function(c){
      return '<tr><td><span class="nm">'+esc(c.name||'—')+'</span></td><td class="em">'+esc(c.email||'—')+'</td><td>'+esc(c.shopper_name)+'</td>' +
        '<td><span class="code">'+esc(c.access_code||'—')+'</span></td>' +
        '<td><span class="pill '+(c.claimed?'green':'')+'">'+(c.claimed?'Actif':'En attente')+'</span>'+(c.suspended?' <span class="pill red">Suspendu</span>':'')+'</td>' +
        '<td><div class="acts"><a class="b" href="/c/'+esc(c.slug)+'?code='+esc(c.access_code||'')+'" target="_blank">Espace</a>' +
        '<button class="b" data-a="magic" data-id="'+c.id+'">Lien</button>' +
        '<button class="b" data-a="suspC" data-id="'+c.id+'">'+(c.suspended?'Réactiver':'Suspendre')+'</button>' +
        '<button class="b d" data-a="delC" data-id="'+c.id+'">Suppr.</button></div></td></tr>';
    }).join('');
  }
  function reviewRows(){
    var rs = DATA.reviews || [];
    if (!rs.length) return '<div class="empty">Aucun avis.</div>';
    return rs.map(function(r){
      return '<div class="row"><div class="stars" style="white-space:nowrap">'+stars(r.stars)+'</div>' +
        '<div style="flex:1;min-width:0"><div class="serif" style="font-style:italic;color:#555">"'+esc(r.review)+'"</div>' +
        '<div class="em">'+esc(r.client_name)+' → '+esc(r.shopper_name)+' · '+fdate(r.created_at)+'</div></div>' +
        '<button class="b d" data-a="delR" data-id="'+r.id+'">Supprimer</button></div>';
    }).join('');
  }
  function activityRows(){
    var items = DATA.shoppers.map(function(s){ return {t:'Styliste',name:s.studio_name||s.name||s.email,at:s.created_at}; })
      .concat(DATA.clients.map(function(c){ return {t:'Client',name:c.name+' ('+c.shopper_name+')',at:c.created_at}; }))
      .filter(function(x){ return x.at; }).sort(function(a,b){ return new Date(b.at)-new Date(a.at); }).slice(0,12);
    if (!items.length) return '<div class="empty">—</div>';
    return items.map(function(i){ return '<div class="row"><span class="pill">'+i.t+'</span><span class="nm" style="flex:1">'+esc(i.name)+'</span><span class="em">'+fdate(i.at)+'</span></div>'; }).join('');
  }

  function draw(){
    var initial = ((ME.name||ME.email||'A').charAt(0)||'A').toUpperCase();
    var nav = [['dash','Tableau de bord',IC.dash],['shop','Stylistes',IC.shop],['cli','Clients',IC.cli],['rev','Avis',IC.rev],['act','Activité',IC.act]]
      .map(function(v){ return '<a data-view="'+v[0]+'" class="'+(view===v[0]?'on':'')+'">'+svg(v[2])+'<span>'+v[1]+'</span></a>'; }).join('');
    root.innerHTML =
      '<div class="shell">' +
        '<div class="side">' +
          '<div class="logo"><span class="lg">S</span><span class="serif">Admin</span></div>' +
          '<div class="nav">'+nav+'</div>' +
          '<div class="prof"><div class="pp">'+initial+'</div><div><div class="pn">'+esc(ME.name||'Administrateur')+'</div><div class="pe">'+esc(ME.email||'')+'</div></div></div>' +
          '<button class="out" data-a="logout">Se déconnecter</button>' +
        '</div>' +
        '<div class="main">' + mainView() + '</div>' +
      '</div>';

    var sEl = document.getElementById('qs'); if (sEl) sEl.oninput = function(e){ qs = e.target.value; var t = document.querySelector('#shopBody'); if (t) t.innerHTML = shopRows(); };
    var cEl = document.getElementById('qc'); if (cEl) cEl.oninput = function(e){ qc = e.target.value; var t = document.querySelector('#cliBody'); if (t) t.innerHTML = cliRows(); };
  }

  function head(t, s){ return '<div class="h1 serif">'+t+'</div><div class="h1s">'+(s||'')+'</div>'; }
  function mainView(){
    var st = DATA.stats;
    if (view === 'shop') return head('Personal Shoppers', DATA.shoppers.length+' comptes') +
      '<div class="card"><div class="ch"><input class="search" id="qs" placeholder="Rechercher…" value="'+esc(qs)+'"><button class="b exp" data-a="expShop">'+svg(IC.exp)+'Export CSV</button></div>' +
      '<table><thead><tr><th>Studio</th><th>Email</th><th>Ville</th><th>Clients</th><th>Note</th><th>Statut</th><th></th></tr></thead><tbody id="shopBody">'+shopRows()+'</tbody></table></div>';
    if (view === 'cli') return head('Clients', DATA.clients.length+' comptes') +
      '<div class="card"><div class="ch"><input class="search" id="qc" placeholder="Rechercher…" value="'+esc(qc)+'"><button class="b exp" data-a="expCli">'+svg(IC.exp)+'Export CSV</button></div>' +
      '<table><thead><tr><th>Nom</th><th>Email</th><th>Styliste</th><th>Code</th><th>Statut</th><th></th></tr></thead><tbody id="cliBody">'+cliRows()+'</tbody></table></div>';
    if (view === 'rev') return head('Avis', (DATA.reviews||[]).length+' avis') + '<div class="card">'+reviewRows()+'</div>';
    if (view === 'act') return head('Activité récente', 'Derniers comptes créés') + '<div class="card">'+activityRows()+'</div>';
    // dashboard — cartes cliquables (sélecteur) : la carte noire pilote le tableau du bas
    function sc(icon, n, l, sel){ var on = sel && dashSel===sel; return '<div class="stat'+(on?' dark':'')+(sel?' clk':'')+'"'+(sel?' data-sel="'+sel+'"':'')+'><div class="ic">'+svg(icon)+'</div><div class="n serif">'+n+'</div><div class="l">'+l+'</div></div>'; }
    return head('Tableau de bord', 'Vue d\'ensemble — cliquez une carte pour voir le détail') +
      '<div class="stats">' +
        sc(IC.shop, st.shoppers, 'Stylistes', 'shop') +
        sc(IC.check, st.public_shoppers, 'Publics', 'shopPub') +
        sc(IC.cli, st.clients, 'Clients', 'cli') +
        sc(IC.check, st.claimed_clients, 'Clients actifs', 'cliAct') +
        sc(IC.bag, st.items, 'Pièces') +
        sc(IC.rev, st.ratings, 'Avis', 'rev') +
      '</div>' +
      '<div class="grid2">' +
        '<div class="card"><div class="ch"><h2 class="serif">Croissance</h2><div class="cs">Nouveaux comptes / mois</div></div>'+chartHtml()+'</div>' +
        '<div class="card">'+proCard()+'</div>' +
      '</div>' +
      '<div class="grid2">' +
        '<div class="card"><div class="ch"><h2 class="serif">Classement stylistes</h2></div>'+leaderboard()+'</div>' +
        '<div class="card"><div class="ch"><h2 class="serif">Répartition</h2></div>'+distribution()+'</div>' +
      '</div>' +
      '<div class="grid2">' +
        '<div class="card"><div class="ch"><h2 class="serif">Alertes & santé</h2></div>'+alerts()+'</div>' +
        '<div class="card pend"><div class="ch"><h2 class="serif">À valider</h2><div class="cs">Clients en attente</div></div>'+pendingHtml()+'</div>' +
      '</div>' +
      '<div class="card">'+dashTable()+'</div>';
  }

  function proCard(){
    var pro = DATA.shoppers.filter(function(s){ return s.plan==='pro'; });
    var free = DATA.shoppers.filter(function(s){ return !s.is_admin && s.plan!=='pro'; }).length;
    var mrr = pro.length * 29;
    var conv = (pro.length + free) ? Math.round(pro.length/(pro.length+free)*100) : 0;
    return '<div class="ch"><h2 class="serif">Abonnements Pro</h2><div class="cs">€29 / mois</div></div>' +
      '<div class="pro-mrr serif">€'+mrr+'<span style="font-size:14px;color:#999"> /mois estimé</span></div>' +
      '<div style="margin-top:14px">' +
      '<div class="pro-row"><span>Abonnés Pro</span><span class="an">'+pro.length+'</span></div>' +
      '<div class="pro-row"><span>Comptes gratuits</span><span>'+free+'</span></div>' +
      '<div class="pro-row"><span>Taux de conversion</span><span>'+conv+'%</span></div>' +
      '</div>' +
      (pro.length ? '<div style="margin-top:10px;font-size:12px;color:#999">'+pro.map(function(s){return esc(s.studio_name||s.name);}).join(', ')+'</div>' : '<div style="margin-top:10px;font-size:12px;color:#999;font-style:italic">Aucun abonné Pro. Passe un styliste en Pro depuis sa fiche.</div>');
  }

  function leaderboard(){
    var rated = DATA.shoppers.filter(function(s){ return !s.is_admin && s.rating_count; }).sort(function(a,b){ return b.rating_avg - a.rating_avg; }).slice(0,3);
    var byCli = DATA.shoppers.filter(function(s){ return !s.is_admin; }).sort(function(a,b){ return b.clients_count - a.clients_count; }).slice(0,3);
    function block(title, arr, val){ return '<div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#999;margin:4px 0 6px">'+title+'</div>' +
      (arr.length ? arr.map(function(s,i){ return '<div class="lead"><div class="rk '+(i===0?'g1':'')+'">'+(i+1)+'</div><div class="ln">'+esc(s.studio_name||s.name||'—')+'</div><div class="lv">'+val(s)+'</div></div>'; }).join('') : '<div class="empty">—</div>'); }
    return block('Mieux notés', rated, function(s){ return s.rating_avg.toFixed(1)+' ★'; }) +
      '<div style="height:10px"></div>' +
      block('Plus de clients', byCli, function(s){ return s.clients_count+' clients'; });
  }

  function donut(label, parts){
    var total = parts.reduce(function(a,p){return a+p.v;},0) || 1, off = 0, r = 32, c = 2*Math.PI*r;
    var seg = parts.map(function(p){ var len = p.v/total*c; var s = '<circle cx="45" cy="45" r="'+r+'" fill="none" stroke="'+p.col+'" stroke-width="13" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'"/>'; off += len; return s; }).join('');
    var leg = parts.map(function(p){ return '<div style="font-size:11px;color:#777"><i style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+p.col+';margin-right:5px"></i>'+p.l+' ('+p.v+')</div>'; }).join('');
    return '<div class="donut"><svg viewBox="0 0 90 90">'+seg+'</svg><div class="dc">'+label+'</div><div style="margin-top:6px;text-align:left">'+leg+'</div></div>';
  }
  function distribution(){
    var sh = DATA.shoppers.filter(function(s){return !s.is_admin;});
    var pub = sh.filter(function(s){return s.is_public;}).length, priv = sh.length-pub;
    var act = DATA.clients.filter(function(c){return c.claimed;}).length, pend = DATA.clients.length-act;
    var cities = {}; sh.forEach(function(s){ if(s.public_city){ cities[s.public_city]=(cities[s.public_city]||0)+1; } });
    var top = Object.keys(cities).map(function(k){return {k:k,n:cities[k]};}).sort(function(a,b){return b.n-a.n;}).slice(0,4);
    var maxc = top.length ? top[0].n : 1;
    var cityHtml = top.length ? top.map(function(t){ return '<div class="citybar"><span class="cn">'+esc(t.k)+'</span><span class="ct"><i style="width:'+Math.round(t.n/maxc*100)+'%"></i></span><span>'+t.n+'</span></div>'; }).join('') : '<div class="empty">Aucune ville.</div>';
    return '<div class="donuts">' +
      donut('Stylistes', [{l:'Publics',v:pub,col:'#111'},{l:'Privés',v:priv,col:'#ddd'}]) +
      donut('Clients', [{l:'Actifs',v:act,col:'#b8915a'},{l:'En attente',v:pend,col:'#eee'}]) +
      '</div>' +
      '<div style="margin-top:14px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#999;margin-bottom:4px">Top villes</div>'+cityHtml;
  }
  function alerts(){
    var a = [];
    var susp = DATA.shoppers.filter(function(s){return s.suspended;}).length + DATA.clients.filter(function(c){return c.suspended;}).length;
    if (susp) a.push({c:'r',n:susp,t:'compte(s) suspendu(s)'});
    var noClient = DATA.shoppers.filter(function(s){return !s.is_admin && s.clients_count===0;}).length;
    if (noClient) a.push({c:'o',n:noClient,t:'styliste(s) sans aucun client'});
    var pend = DATA.clients.filter(function(c){return !c.claimed;}).length;
    if (pend) a.push({c:'o',n:pend,t:'client(s) en attente de connexion'});
    var incomplete = DATA.shoppers.filter(function(s){return s.is_public && (!s.portfolio_count || !s.public_tagline || !s.bio);}).length;
    if (incomplete) a.push({c:'o',n:incomplete,t:'profil(s) public(s) incomplet(s)'});
    if (!a.length) a.push({c:'b',n:'✓',t:'Tout est en ordre, aucune alerte.'});
    return a.map(function(x){ return '<div class="alert"><span class="ab '+x.c+'"></span><span class="at"><span class="an">'+x.n+'</span> '+x.t+'</span></div>'; }).join('');
  }

  function dashTable(){
    var sel = dashSel;
    if (sel === 'rev') {
      return '<div class="ch"><h2 class="serif">Avis</h2><div class="cs">'+(DATA.reviews||[]).length+'</div></div>' + reviewRows();
    }
    if (sel === 'shop' || sel === 'shopPub') {
      var list = DATA.shoppers.filter(function(s){ return sel==='shopPub' ? s.is_public : true; });
      var title = sel==='shopPub' ? 'Stylistes publics' : 'Tous les stylistes';
      var body = list.length ? list.map(function(s){
        var st = '<span class="pill '+(s.is_public?'green':'')+'">'+(s.is_public?'Public':'Privé')+'</span>'+(s.suspended?' <span class="pill red">Susp.</span>':'');
        return '<tr><td><span class="nm">'+esc(s.studio_name||s.name||'—')+'</span></td><td class="em">'+esc(s.email||'—')+'</td><td>'+esc(s.public_city||'—')+'</td><td>'+s.clients_count+'</td><td>'+st+'</td>'+
          '<td><div class="acts">'+(s.is_admin?'':'<button class="b k" data-a="manage" data-id="'+s.id+'">Gérer</button>')+'<button class="b" data-a="goShop">Voir tout →</button></div></td></tr>';
      }).join('') : '<tr><td colspan="6" class="empty">Aucun.</td></tr>';
      return '<div class="ch"><h2 class="serif">'+title+'</h2><div class="cs">'+list.length+'</div></div>'+
        '<table><thead><tr><th>Studio</th><th>Email</th><th>Ville</th><th>Clients</th><th>Statut</th><th></th></tr></thead><tbody>'+body+'</tbody></table>';
    }
    // clients (par défaut) / clients actifs
    var cl = DATA.clients.filter(function(c){ return sel==='cliAct' ? c.claimed : true; });
    var t2 = sel==='cliAct' ? 'Clients actifs' : 'Tous les clients';
    var b2 = cl.length ? cl.map(function(c){
      return '<tr><td><span class="nm">'+esc(c.name||'—')+'</span></td><td class="em">'+esc(c.email||'—')+'</td><td>'+esc(c.shopper_name)+'</td><td><span class="pill '+(c.claimed?'green':'')+'">'+(c.claimed?'Actif':'En attente')+'</span></td>'+
        '<td><div class="acts"><a class="b" href="/c/'+esc(c.slug)+'?code='+esc(c.access_code||'')+'" target="_blank">Espace</a><button class="b" data-a="goCli">Voir tout →</button></div></td></tr>';
    }).join('') : '<tr><td colspan="5" class="empty">Aucun.</td></tr>';
    return '<div class="ch"><h2 class="serif">'+t2+'</h2><div class="cs">'+cl.length+'</div></div>'+
      '<table><thead><tr><th>Nom</th><th>Email</th><th>Styliste</th><th>Statut</th><th></th></tr></thead><tbody>'+b2+'</tbody></table>';
  }

  function chartHtml(){
    var now = new Date(), months = [];
    for (var i = 7; i >= 0; i--) { var d = new Date(now.getFullYear(), now.getMonth()-i, 1); months.push({ y:d.getFullYear(), m:d.getMonth(), s:0, c:0 }); }
    function bump(at, k){ if(!at) return; var d=new Date(at); for(var j=0;j<months.length;j++){ if(months[j].y===d.getFullYear()&&months[j].m===d.getMonth()){ months[j][k]++; break; } } }
    DATA.shoppers.forEach(function(s){ bump(s.created_at, 's'); });
    DATA.clients.forEach(function(c){ bump(c.created_at, 'c'); });
    var max = Math.max(1, Math.max.apply(null, months.map(function(x){return Math.max(x.s,x.c);})));
    var nm = ['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];
    return '<div class="chart">'+months.map(function(x){
      var hs=Math.round(x.s/max*140)+3, hc=Math.round(x.c/max*140)+3;
      return '<div class="col" title="'+x.s+' styliste(s), '+x.c+' client(s)"><div class="pair"><div class="bar2 s" style="height:'+hs+'px"></div><div class="bar2" style="height:'+hc+'px"></div></div><div class="bl">'+nm[x.m]+'</div></div>';
    }).join('')+'</div><div class="legend"><span><i style="background:#111"></i>Stylistes</span><span><i style="background:#ddd"></i>Clients</span></div>';
  }
  function pendingHtml(){
    var p = DATA.clients.filter(function(c){ return !c.claimed; }).slice(0, 6);
    if (!p.length) return '<div class="empty">Aucun client en attente.</div>';
    return p.map(function(c){
      var ini = ((c.name||'?').charAt(0)||'?').toUpperCase();
      return '<div class="pi"><div class="pa">'+ini+'</div><div style="flex:1;min-width:0"><div class="pn">'+esc(c.name||'—')+'</div><div class="pe2">'+esc(c.shopper_name)+'</div></div><span class="pill">En attente</span></div>';
    }).join('');
  }

  // Délégation : un seul listener pour toutes les actions
  document.addEventListener('click', function(e){
    var nv = e.target.closest('[data-view]');
    if (nv) { e.preventDefault(); view = nv.dataset.view; draw(); window.scrollTo(0,0); return; }
    var sel = e.target.closest('[data-sel]');
    if (sel) { dashSel = sel.dataset.sel; draw(); return; }
    var el = e.target.closest('[data-a]'); if (!el) return;
    var a = el.dataset.a, id = el.dataset.id;
    var s = id && DATA ? DATA.shoppers.find(function(x){return x.id==id;}) : null;
    var c = id && DATA ? DATA.clients.find(function(x){return x.id==id;}) : null;
    if (a==='expShop') { exportCsv('stylistes', ['Studio','Nom','Email','Ville','Clients','Note','Public','Suspendu'], DATA.shoppers.map(function(s){ return [s.studio_name,s.name,s.email,s.public_city,s.clients_count,s.rating_count?s.rating_avg.toFixed(1):'',s.is_public?'oui':'non',s.suspended?'oui':'non']; })); return; }
    if (a==='expCli') { exportCsv('clients', ['Nom','Email','Styliste','Code','Actif','Suspendu'], DATA.clients.map(function(c){ return [c.name,c.email,c.shopper_name,c.access_code,c.claimed?'oui':'non',c.suspended?'oui':'non']; })); return; }
    if (a==='goShop') { view='shop'; draw(); window.scrollTo(0,0); return; }
    if (a==='goCli') { view='cli'; draw(); window.scrollTo(0,0); return; }
    if (a==='logout') { fetch('/api/auth/logout',{method:'POST'}).then(function(){ location.href='/login'; }); }
    else if (a==='manage') { fetch('/api/admin/impersonate/'+id,{method:'POST'}).then(function(r){ if(r.ok) location.href='/admin'; else alert('Erreur'); }); }
    else if (a==='pub') { fetch('/api/admin/shopper/'+id+'/public',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_public:!s.is_public})}).then(function(r){ if(r.ok){ s.is_public=!s.is_public; refreshShop(); } }); }
    else if (a==='feat') { fetch('/api/admin/shopper/'+id+'/featured',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({featured:!s.featured})}).then(function(r){ if(r.ok){ s.featured=!s.featured; refreshShop(); } }); }
    else if (a==='plan') { var np = s.plan==='pro'?'free':'pro'; fetch('/api/admin/shopper/'+id+'/plan',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan:np})}).then(function(r){ if(r.ok){ s.plan=np; refreshShop(); } }); }
    else if (a==='susp') { if(!s.suspended && !confirm('Suspendre ce styliste ?')) return; fetch('/api/admin/shopper/'+id+'/suspend',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({suspended:!s.suspended})}).then(function(r){ if(r.ok){ s.suspended=!s.suspended; refreshShop(); } }); }
    else if (a==='pwd') { if(!confirm('Réinitialiser le mot de passe ?')) return; fetch('/api/admin/shopper/'+id+'/reset-password',{method:'POST'}).then(function(r){return r.json();}).then(function(d){ if(d.password) prompt('Mot de passe temporaire :', d.password); else alert(d.error||'Erreur'); }); }
    else if (a==='delS') { if(!confirm('Supprimer ce styliste et ses données ?')) return; fetch('/api/admin/shopper/'+id,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){ if(d.ok){ DATA.shoppers=DATA.shoppers.filter(function(x){return x.id!=id;}); DATA.clients=DATA.clients.filter(function(x){return x.shopper_id!=id;}); draw(); } else alert(d.error||'Erreur'); }); }
    else if (a==='magic') { fetch('/api/admin/client/'+id+'/magic-link',{method:'POST'}).then(function(r){return r.json();}).then(function(d){ if(d.magic_url) prompt('Lien d\'accès :', d.magic_url); else alert(d.error||'Erreur'); }); }
    else if (a==='suspC') { fetch('/api/admin/client/'+id+'/suspend',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({suspended:!c.suspended})}).then(function(r){ if(r.ok){ c.suspended=!c.suspended; refreshCli(); } }); }
    else if (a==='delC') { if(!confirm('Supprimer ce client ?')) return; fetch('/api/admin/client/'+id,{method:'DELETE'}).then(function(r){ if(r.ok){ DATA.clients=DATA.clients.filter(function(x){return x.id!=id;}); draw(); } }); }
    else if (a==='delR') { if(!confirm('Supprimer cet avis ?')) return; fetch('/api/admin/rating/'+id,{method:'DELETE'}).then(function(r){ if(r.ok){ DATA.reviews=DATA.reviews.filter(function(x){return x.id!=id;}); draw(); } }); }
  });
  function refreshShop(){ var t=document.getElementById('shopBody'); if(t) t.innerHTML = shopRows(); }
  function refreshCli(){ var t=document.getElementById('cliBody'); if(t) t.innerHTML = cliRows(); }
  function exportCsv(name, headers, rows){
    var cell = function(v){ v = v==null?'':String(v); return /[",;\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
    var csv = headers.join(';') + '\n' + rows.map(function(r){ return r.map(cell).join(';'); }).join('\n');
    var blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'studio-'+name+'.csv'; a.click();
  }
})();
</script>
</body>
</html>
