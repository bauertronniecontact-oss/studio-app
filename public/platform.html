<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plateforme — Admin</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .pf-wrap { max-width: 1240px; margin: 0 auto; padding: 28px 32px 80px; }
  .pf-head { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 26px; }
  .pf-head h1 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400; }
  .pf-head .sub { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); }
  .pf-back { font-size: 12px; letter-spacing: 0.06em; color: var(--ink-soft); text-decoration: none; }
  .pf-back:hover { color: var(--accent); }

  .pf-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 34px; }
  @media (max-width: 900px) { .pf-stats { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 540px) { .pf-stats { grid-template-columns: repeat(2, 1fr); } }
  .pf-stat { background: var(--bg-soft); border: 1px solid var(--hairline); padding: 16px; border-radius: 3px; }
  .pf-stat .n { font-family: 'Cormorant Garamond', serif; font-size: 30px; color: var(--ink); line-height: 1; }
  .pf-stat .l { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }

  .pf-section { margin-bottom: 40px; }
  .pf-section h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; margin-bottom: 4px; }
  .pf-section .h-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .pf-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pf-table th { text-align: left; font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--hairline-strong); }
  .pf-table td { padding: 11px 10px; border-bottom: 1px solid var(--hairline); vertical-align: middle; }
  .pf-table tr:hover td { background: var(--bg-soft); }
  .pf-name { font-weight: 500; color: var(--ink); }
  .pf-email { color: var(--muted); font-size: 12px; }
  .pf-tag { display: inline-block; font-size: 10px; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 10px; background: var(--bg-soft); border: 1px solid var(--hairline); color: var(--ink-soft); }
  .pf-tag.pub { background: rgba(184,145,90,0.12); border-color: rgba(184,145,90,0.3); color: var(--accent); }
  .pf-tag.admin { background: var(--ink); color: #fff; border-color: var(--ink); }
  .pf-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .pf-btn { font-family: 'Inter', sans-serif; font-size: 11px; padding: 5px 10px; border: 1px solid var(--hairline-strong); background: #fff; color: var(--ink); cursor: pointer; border-radius: 3px; transition: all .15s; white-space: nowrap; }
  .pf-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pf-btn.danger:hover { background: #b03030; border-color: #b03030; }
  .pf-stars { color: var(--accent); letter-spacing: 1px; font-size: 12px; }
  .pf-search { width: 220px; max-width: 100%; background: #fff; border: 1px solid var(--hairline-strong); padding: 8px 12px; font-size: 13px; border-radius: 3px; }
  .pf-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .pf-loading { padding: 60px; text-align: center; font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); }
  @media (max-width: 700px) { .pf-table thead { display: none; } .pf-table td { display: block; border: none; padding: 3px 0; } .pf-table tr { display: block; border-bottom: 1px solid var(--hairline-strong); padding: 12px 0; } .pf-actions { justify-content: flex-start; margin-top: 8px; } }
</style>
</head>
<body>
<div id="root"><div class="pf-loading">Chargement…</div></div>

<script>
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const stars = a => { const f=Math.round(a||0); let o=''; for(let i=1;i<=5;i++) o+=`<span style="color:${i<=f?'var(--accent)':'var(--hairline-strong)'}">★</span>`; return o; };

(async function(){
  const root = document.getElementById('root');
  // garde admin
  let me;
  try { me = await fetch('/api/me').then(r => r.ok ? r.json() : null); } catch {}
  if (!me) { location.href = '/login'; return; }
  if (!me.is_admin) { root.innerHTML = '<div class="pf-loading">Accès réservé à l\'administrateur.<br><br><a class="pf-back" href="/admin">← Retour à mon studio</a></div>'; return; }

  let data;
  try { data = await fetch('/api/admin/overview').then(r => r.json()); }
  catch { root.innerHTML = '<div class="pf-loading">Erreur de chargement.</div>'; return; }

  function render(){
    const st = data.stats;
    root.innerHTML = `
      <div class="pf-wrap">
        <div class="pf-head">
          <div>
            <h1>Plateforme</h1>
            <div class="sub">Vue d'ensemble — tous les comptes</div>
          </div>
          <a class="pf-back" href="/admin">← Mon studio</a>
        </div>

        <div class="pf-stats">
          <div class="pf-stat"><div class="n">${st.shoppers}</div><div class="l">Stylistes</div></div>
          <div class="pf-stat"><div class="n">${st.public_shoppers}</div><div class="l">Publics</div></div>
          <div class="pf-stat"><div class="n">${st.clients}</div><div class="l">Clients</div></div>
          <div class="pf-stat"><div class="n">${st.claimed_clients}</div><div class="l">Clients actifs</div></div>
          <div class="pf-stat"><div class="n">${st.items}</div><div class="l">Pièces</div></div>
          <div class="pf-stat"><div class="n">${st.ratings}</div><div class="l">Avis</div></div>
        </div>

        <div class="pf-section">
          <div class="pf-toolbar">
            <div><h2>Personal Shoppers</h2><div class="h-sub">${data.shoppers.length} compte${data.shoppers.length>1?'s':''}</div></div>
            <input class="pf-search" id="searchShoppers" placeholder="🔎 Rechercher un styliste…">
          </div>
          <table class="pf-table"><thead><tr>
            <th>Studio / Nom</th><th>Email</th><th>Ville</th><th>Clients</th><th>Note</th><th>Statut</th><th></th>
          </tr></thead><tbody id="shoppersBody"></tbody></table>
        </div>

        <div class="pf-section">
          <div class="pf-toolbar">
            <div><h2>Clients</h2><div class="h-sub">${data.clients.length} compte${data.clients.length>1?'s':''}</div></div>
            <input class="pf-search" id="searchClients" placeholder="🔎 Rechercher un client…">
          </div>
          <table class="pf-table"><thead><tr>
            <th>Nom</th><th>Email</th><th>Styliste</th><th>Code d'accès</th><th>Statut</th><th></th>
          </tr></thead><tbody id="clientsBody"></tbody></table>
        </div>
      </div>`;

    renderShoppers(''); renderClients('');
    document.getElementById('searchShoppers').addEventListener('input', e => renderShoppers(e.target.value));
    document.getElementById('searchClients').addEventListener('input', e => renderClients(e.target.value));
  }

  function renderShoppers(q){
    q = q.trim().toLowerCase();
    const rows = data.shoppers.filter(s => !q ||
      (s.studio_name||'').toLowerCase().includes(q) || (s.name||'').toLowerCase().includes(q) ||
      (s.email||'').toLowerCase().includes(q) || (s.public_city||'').toLowerCase().includes(q));
    document.getElementById('shoppersBody').innerHTML = rows.map(s => `
      <tr data-sid="${s.id}">
        <td><span class="pf-name">${esc(s.studio_name || s.name || '—')}</span>${s.is_admin?' <span class="pf-tag admin">admin</span>':''}${s.name && s.studio_name ? `<div class="pf-email">${esc(s.name)}</div>` : ''}</td>
        <td class="pf-email">${esc(s.email||'—')}</td>
        <td>${esc(s.public_city||'—')}</td>
        <td>${s.clients_count}</td>
        <td>${s.rating_count ? `<span class="pf-stars">${stars(s.rating_avg)}</span> <span class="pf-email">${s.rating_avg.toFixed(1)} (${s.rating_count})</span>` : '<span class="pf-email">—</span>'}</td>
        <td><span class="pf-tag ${s.is_public?'pub':''}">${s.is_public?'Public':'Privé'}</span></td>
        <td><div class="pf-actions">
          ${s.public_slug ? `<a class="pf-btn" href="/s/${esc(s.public_slug)}" target="_blank">Profil</a>` : ''}
          <button class="pf-btn" data-act="togglePublic">${s.is_public?'Dépublier':'Publier'}</button>
          ${s.is_admin ? '' : '<button class="pf-btn danger" data-act="delShopper">Supprimer</button>'}
        </div></td>
      </tr>`).join('') || '<tr><td colspan="7" class="pf-email" style="padding:20px;">Aucun résultat.</td></tr>';

    document.querySelectorAll('#shoppersBody tr[data-sid]').forEach(tr => {
      const id = +tr.dataset.sid;
      const s = data.shoppers.find(x => x.id === id);
      tr.querySelector('[data-act=togglePublic]')?.addEventListener('click', async () => {
        const r = await fetch(`/api/admin/shopper/${id}/public`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ is_public: !s.is_public }) });
        if (r.ok) { s.is_public = !s.is_public; renderShoppers(document.getElementById('searchShoppers').value); }
      });
      tr.querySelector('[data-act=delShopper]')?.addEventListener('click', async () => {
        if (!confirm(`Supprimer le styliste "${s.studio_name||s.name}" et TOUS ses clients/données ? Irréversible.`)) return;
        const r = await fetch(`/api/admin/shopper/${id}`, { method:'DELETE' });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { alert(d.error || 'Erreur'); return; }
        data.shoppers = data.shoppers.filter(x => x.id !== id);
        data.clients = data.clients.filter(c => c.shopper_id !== id);
        render();
      });
    });
  }

  function renderClients(q){
    q = q.trim().toLowerCase();
    const rows = data.clients.filter(c => !q ||
      (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) ||
      (c.shopper_name||'').toLowerCase().includes(q));
    document.getElementById('clientsBody').innerHTML = rows.map(c => `
      <tr data-cid="${c.id}">
        <td><span class="pf-name">${esc(c.name||'—')}</span></td>
        <td class="pf-email">${esc(c.email||'—')}</td>
        <td>${esc(c.shopper_name)}</td>
        <td><code style="font-family:monospace;letter-spacing:1px;background:var(--bg-soft);padding:2px 6px;border-radius:3px;">${esc(c.access_code||'—')}</code></td>
        <td><span class="pf-tag ${c.claimed?'pub':''}">${c.claimed?'Actif':'En attente'}</span></td>
        <td><div class="pf-actions">
          <a class="pf-btn" href="/c/${esc(c.slug)}?code=${esc(c.access_code||'')}" target="_blank">Espace</a>
          <button class="pf-btn danger" data-act="delClient">Supprimer</button>
        </div></td>
      </tr>`).join('') || '<tr><td colspan="6" class="pf-email" style="padding:20px;">Aucun résultat.</td></tr>';

    document.querySelectorAll('#clientsBody tr[data-cid]').forEach(tr => {
      const id = +tr.dataset.cid;
      const c = data.clients.find(x => x.id === id);
      tr.querySelector('[data-act=delClient]')?.addEventListener('click', async () => {
        if (!confirm(`Supprimer le client "${c.name}" et ses données ? Irréversible.`)) return;
        const r = await fetch(`/api/admin/client/${id}`, { method:'DELETE' });
        if (r.ok) { data.clients = data.clients.filter(x => x.id !== id); render(); }
      });
    });
  }

  render();
})();
</script>
</body>
</html>
