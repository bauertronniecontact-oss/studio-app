<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Administration — Studio</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #e9e9ea; font-family: 'Inter', system-ui, sans-serif; color: #111; }
  .serif { font-family: 'Cormorant Garamond', Georgia, serif; }
  a { text-decoration: none; }

  .shell { display: grid; grid-template-columns: 230px 1fr; gap: 18px; padding: 18px; align-items: start; }
  @media (max-width: 820px) { .shell { grid-template-columns: 1fr; } }

  .side { background: #fff; border-radius: 20px; padding: 24px 16px; }
  .side .logo { display: flex; align-items: center; gap: 10px; font-size: 21px; font-weight: 500; padding: 0 6px 24px; }
  .side .logo .lg { width: 30px; height: 30px; background: #111; color: #fff; border-radius: 9px; display: grid; place-items: center; font-size: 14px; font-weight: 700; }
  .nav a { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 12px; color: #555; font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .nav a:hover { background: #f3f2f0; color: #111; }
  .nav a.on { background: #111; color: #fff; }
  .side .prof { margin-top: 22px; padding-top: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
  .side .prof .pp { width: 36px; height: 36px; border-radius: 50%; background: #111; color: #fff; display: grid; place-items: center; font-weight: 700; }
  .side .prof .pn { font-size: 13px; font-weight: 600; }
  .side .prof .pe { font-size: 11px; color: #999; }
  .side .out { background: none; border: none; color: #999; cursor: pointer; font-size: 12px; margin-top: 14px; padding: 4px 6px; }
  .side .out:hover { color: #b03030; }

  .main { min-width: 0; }
  .h1 { font-size: 30px; font-weight: 500; margin: 4px 0 2px; }
  .h1s { font-size: 13px; color: #999; margin-bottom: 20px; }

  .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 18px; }
  @media (max-width: 1100px) { .stats { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: #fff; border-radius: 18px; padding: 20px; text-align: center; }
  .stat.dark { background: #111; color: #fff; }
  .stat .n { font-size: 30px; line-height: 1; font-weight: 500; }
  .stat .l { font-size: 11px; color: #999; margin-top: 8px; }
  .stat.dark .l { color: rgba(255,255,255,.65); }

  .card { background: #fff; border-radius: 20px; padding: 22px 22px; margin-bottom: 18px; }
  .card .ch { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .card .ch h2 { font-size: 20px; font-weight: 500; margin: 0; }
  .card .ch .cs { font-size: 12px; color: #999; }
  .search { background: #f3f2f0; border: 1px solid transparent; padding: 9px 13px; border-radius: 11px; font-size: 13px; width: 220px; max-width: 100%; }
  .search:focus { outline: none; background: #fff; border-color: #ddd; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; color: #999; font-weight: 500; padding: 9px 10px; border-bottom: 1px solid #eee; }
  td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .nm { font-weight: 600; }
  .em { color: #999; font-size: 12px; }
  .pill { display: inline-block; font-size: 11px; padding: 4px 10px; border-radius: 18px; background: #f3f2f0; color: #555; }
  .pill.green { background: #e8f3ec; color: #2e7d4f; }
  .pill.gold { background: rgba(184,145,90,.15); color: #b8915a; }
  .pill.red { background: #fbeaea; color: #b03030; }
  .pill.dark { background: #111; color: #fff; }
  .acts { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
  .b { font-size: 11.5px; padding: 6px 11px; border: 1px solid #ddd; background: #fff; color: #111; cursor: pointer; border-radius: 9px; white-space: nowrap; }
  .b:hover { background: #b8915a; color: #fff; border-color: #b8915a; }
  .b.k { background: #111; color: #fff; border-color: #111; }
  .b.k:hover { background: #b8915a; border-color: #b8915a; }
  .b.d:hover { background: #b03030; border-color: #b03030; }
  .stars { color: #b8915a; letter-spacing: 1px; }
  .code { font-family: monospace; background: #f3f2f0; padding: 2px 7px; border-radius: 6px; }
  .row { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .empty { color: #999; font-style: italic; padding: 16px; }
  .center { text-align: center; padding: 80px; color: #999; font-style: italic; }
  @media (max-width: 700px) { thead { display: none; } td { display: block; padding: 3px 0; border: none; } tr { display: block; padding: 12px 0; border-bottom: 1px solid #ddd; } .acts { justify-content: flex-start; margin-top: 8px; } }
</style>
</head>
<body>
<div id="root"><div class="center">Chargement…</div></div>

<script>
var esc = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
var stars = function(a){ var f=Math.round(a||0),o=''; for(var i=1;i<=5;i++) o+='<span style="color:'+(i<=f?'#b8915a':'#ccc')+'">★</span>'; return o; };
var fdate = function(d){ try { return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return ''; } };

(function(){
  var root = document.getElementById('root');
  var DATA = null, ME = null, qs = '', qc = '';

  fetch('/api/me').then(function(r){ return r.ok ? r.json() : null; }).then(function(me){
    if (!me) { location.href = '/login'; return; }
    ME = me;
    if (!me.is_admin) { root.innerHTML = '<div class="center">Accès réservé à l\'administrateur.<br><br><a href="/admin">← Retour</a></div>'; return; }
    return fetch('/api/admin/overview').then(function(r){ return r.json(); }).then(function(d){ DATA = d; draw(); });
  }).catch(function(e){ root.innerHTML = '<div class="center">Erreur : ' + esc(e && e.message) + '</div>'; });

  function shopRows(){
    var q = qs.toLowerCase();
    var rows = DATA.shoppers.filter(function(s){ return !q || (s.studio_name||'').toLowerCase().indexOf(q)>=0 || (s.name||'').toLowerCase().indexOf(q)>=0 || (s.email||'').toLowerCase().indexOf(q)>=0; });
    if (!rows.length) return '<tr><td colspan="7" class="empty">Aucun résultat.</td></tr>';
    return rows.map(function(s){
      var rt = s.rating_count ? '<span class="stars">'+stars(s.rating_avg)+'</span> <span class="em">'+s.rating_avg.toFixed(1)+'</span>' : '<span class="em">—</span>';
      var st = '<span class="pill '+(s.is_public?'green':'')+'">'+(s.is_public?'Public':'Privé')+'</span>' + (s.suspended?' <span class="pill red">Suspendu</span>':'') + (s.featured?' <span class="pill gold">★</span>':'');
      var acts = s.is_admin ? '' :
        '<button class="b k" data-a="manage" data-id="'+s.id+'">Gérer</button>' +
        (s.public_slug?'<a class="b" href="/s/'+esc(s.public_slug)+'" target="_blank">Profil</a>':'') +
        '<button class="b" data-a="pub" data-id="'+s.id+'">'+(s.is_public?'Dépublier':'Publier')+'</button>' +
        '<button class="b" data-a="feat" data-id="'+s.id+'">'+(s.featured?'Retirer ★':'★')+'</button>' +
        '<button class="b" data-a="susp" data-id="'+s.id+'">'+(s.suspended?'Réactiver':'Suspendre')+'</button>' +
        '<button class="b" data-a="pwd" data-id="'+s.id+'">Reset</button>' +
        '<button class="b d" data-a="delS" data-id="'+s.id+'">Suppr.</button>';
      return '<tr><td><span class="nm">'+esc(s.studio_name||s.name||'—')+'</span>'+(s.is_admin?' <span class="pill dark">admin</span>':'')+'</td>' +
        '<td class="em">'+esc(s.email||'—')+'</td><td>'+esc(s.public_city||'—')+'</td><td>'+s.clients_count+'</td><td>'+rt+'</td><td>'+st+'</td><td><div class="acts">'+acts+'</div></td></tr>';
    }).join('');
  }
  function cliRows(){
    var q = qc.toLowerCase();
    var rows = DATA.clients.filter(function(c){ return !q || (c.name||'').toLowerCase().indexOf(q)>=0 || (c.email||'').toLowerCase().indexOf(q)>=0 || (c.shopper_name||'').toLowerCase().indexOf(q)>=0; });
    if (!rows.length) return '<tr><td colspan="6" class="empty">Aucun résultat.</td></tr>';
    return rows.map(function(c){
      return '<tr><td><span class="nm">'+esc(c.name||'—')+'</span></td><td class="em">'+esc(c.email||'—')+'</td><td>'+esc(c.shopper_name)+'</td>' +
        '<td><span class="code">'+esc(c.access_code||'—')+'</span></td>' +
        '<td><span class="pill '+(c.claimed?'green':'')+'">'+(c.claimed?'Actif':'En attente')+'</span>'+(c.suspended?' <span class="pill red">Suspendu</span>':'')+'</td>' +
        '<td><div class="acts"><a class="b" href="/c/'+esc(c.slug)+'?code='+esc(c.access_code||'')+'" target="_blank">Espace</a>' +
        '<button class="b" data-a="magic" data-id="'+c.id+'">Lien</button>' +
        '<button class="b" data-a="suspC" data-id="'+c.id+'">'+(c.suspended?'Réactiver':'Suspendre')+'</button>' +
        '<button class="b d" data-a="delC" data-id="'+c.id+'">Suppr.</button></div></td></tr>';
    }).join('');
  }
  function reviewRows(){
    var rs = DATA.reviews || [];
    if (!rs.length) return '<div class="empty">Aucun avis.</div>';
    return rs.map(function(r){
      return '<div class="row"><div class="stars" style="white-space:nowrap">'+stars(r.stars)+'</div>' +
        '<div style="flex:1;min-width:0"><div class="serif" style="font-style:italic;color:#555">"'+esc(r.review)+'"</div>' +
        '<div class="em">'+esc(r.client_name)+' → '+esc(r.shopper_name)+' · '+fdate(r.created_at)+'</div></div>' +
        '<button class="b d" data-a="delR" data-id="'+r.id+'">Supprimer</button></div>';
    }).join('');
  }
  function activityRows(){
    var items = DATA.shoppers.map(function(s){ return {t:'Styliste',name:s.studio_name||s.name||s.email,at:s.created_at}; })
      .concat(DATA.clients.map(function(c){ return {t:'Client',name:c.name+' ('+c.shopper_name+')',at:c.created_at}; }))
      .filter(function(x){ return x.at; }).sort(function(a,b){ return new Date(b.at)-new Date(a.at); }).slice(0,12);
    if (!items.length) return '<div class="empty">—</div>';
    return items.map(function(i){ return '<div class="row"><span class="pill">'+i.t+'</span><span class="nm" style="flex:1">'+esc(i.name)+'</span><span class="em">'+fdate(i.at)+'</span></div>'; }).join('');
  }

  function draw(){
    var st = DATA.stats;
    var initial = ((ME.name||ME.email||'A').charAt(0)||'A').toUpperCase();
    root.innerHTML =
      '<div class="shell">' +
        '<div class="side">' +
          '<div class="logo"><span class="lg">S</span><span class="serif">Admin</span></div>' +
          '<div class="nav">' +
            '<a class="on" href="#">Tableau de bord</a>' +
            '<a href="#sec-shop">Stylistes</a>' +
            '<a href="#sec-cli">Clients</a>' +
            '<a href="#sec-rev">Avis</a>' +
            '<a href="#sec-act">Activité</a>' +
          '</div>' +
          '<div class="prof"><div class="pp">'+initial+'</div><div><div class="pn">'+esc(ME.name||'Administrateur')+'</div><div class="pe">'+esc(ME.email||'')+'</div></div></div>' +
          '<button class="out" data-a="logout">Se déconnecter</button>' +
        '</div>' +
        '<div class="main">' +
          '<div class="h1 serif">Tableau de bord</div><div class="h1s">Vue d\'ensemble de la plateforme</div>' +
          '<div class="stats">' +
            '<div class="stat"><div class="n serif">'+st.shoppers+'</div><div class="l">Stylistes</div></div>' +
            '<div class="stat"><div class="n serif">'+st.public_shoppers+'</div><div class="l">Publics</div></div>' +
            '<div class="stat dark"><div class="n serif">'+st.clients+'</div><div class="l">Clients</div></div>' +
            '<div class="stat"><div class="n serif">'+st.claimed_clients+'</div><div class="l">Clients actifs</div></div>' +
            '<div class="stat"><div class="n serif">'+st.items+'</div><div class="l">Pièces</div></div>' +
            '<div class="stat"><div class="n serif">'+st.ratings+'</div><div class="l">Avis</div></div>' +
          '</div>' +
          '<div class="card" id="sec-shop"><div class="ch"><div><h2 class="serif">Personal Shoppers</h2><div class="cs">'+DATA.shoppers.length+' comptes</div></div><input class="search" id="qs" placeholder="Rechercher…" value="'+esc(qs)+'"></div>' +
            '<table><thead><tr><th>Studio</th><th>Email</th><th>Ville</th><th>Clients</th><th>Note</th><th>Statut</th><th></th></tr></thead><tbody>'+shopRows()+'</tbody></table></div>' +
          '<div class="card" id="sec-cli"><div class="ch"><div><h2 class="serif">Clients</h2><div class="cs">'+DATA.clients.length+' comptes</div></div><input class="search" id="qc" placeholder="Rechercher…" value="'+esc(qc)+'"></div>' +
            '<table><thead><tr><th>Nom</th><th>Email</th><th>Styliste</th><th>Code</th><th>Statut</th><th></th></tr></thead><tbody>'+cliRows()+'</tbody></table></div>' +
          '<div class="card" id="sec-rev"><div class="ch"><div><h2 class="serif">Avis</h2><div class="cs">'+(DATA.reviews||[]).length+'</div></div></div>'+reviewRows()+'</div>' +
          '<div class="card" id="sec-act"><div class="ch"><div><h2 class="serif">Activité récente</h2></div></div>'+activityRows()+'</div>' +
        '</div>' +
      '</div>';

    var sEl = document.getElementById('qs'); if (sEl) sEl.oninput = function(e){ qs = e.target.value; var t = document.querySelector('#sec-shop tbody'); if (t) t.innerHTML = shopRows(); };
    var cEl = document.getElementById('qc'); if (cEl) cEl.oninput = function(e){ qc = e.target.value; var t = document.querySelector('#sec-cli tbody'); if (t) t.innerHTML = cliRows(); };
  }

  // Délégation : un seul listener pour toutes les actions
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-a]'); if (!el) return;
    var a = el.dataset.a, id = el.dataset.id;
    var s = id && DATA ? DATA.shoppers.find(function(x){return x.id==id;}) : null;
    var c = id && DATA ? DATA.clients.find(function(x){return x.id==id;}) : null;
    if (a==='logout') { fetch('/api/auth/logout',{method:'POST'}).then(function(){ location.href='/login'; }); }
    else if (a==='manage') { fetch('/api/admin/impersonate/'+id,{method:'POST'}).then(function(r){ if(r.ok) location.href='/admin'; else alert('Erreur'); }); }
    else if (a==='pub') { fetch('/api/admin/shopper/'+id+'/public',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_public:!s.is_public})}).then(function(r){ if(r.ok){ s.is_public=!s.is_public; refreshShop(); } }); }
    else if (a==='feat') { fetch('/api/admin/shopper/'+id+'/featured',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({featured:!s.featured})}).then(function(r){ if(r.ok){ s.featured=!s.featured; refreshShop(); } }); }
    else if (a==='susp') { if(!s.suspended && !confirm('Suspendre ce styliste ?')) return; fetch('/api/admin/shopper/'+id+'/suspend',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({suspended:!s.suspended})}).then(function(r){ if(r.ok){ s.suspended=!s.suspended; refreshShop(); } }); }
    else if (a==='pwd') { if(!confirm('Réinitialiser le mot de passe ?')) return; fetch('/api/admin/shopper/'+id+'/reset-password',{method:'POST'}).then(function(r){return r.json();}).then(function(d){ if(d.password) prompt('Mot de passe temporaire :', d.password); else alert(d.error||'Erreur'); }); }
    else if (a==='delS') { if(!confirm('Supprimer ce styliste et ses données ?')) return; fetch('/api/admin/shopper/'+id,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){ if(d.ok){ DATA.shoppers=DATA.shoppers.filter(function(x){return x.id!=id;}); DATA.clients=DATA.clients.filter(function(x){return x.shopper_id!=id;}); draw(); } else alert(d.error||'Erreur'); }); }
    else if (a==='magic') { fetch('/api/admin/client/'+id+'/magic-link',{method:'POST'}).then(function(r){return r.json();}).then(function(d){ if(d.magic_url) prompt('Lien d\'accès :', d.magic_url); else alert(d.error||'Erreur'); }); }
    else if (a==='suspC') { fetch('/api/admin/client/'+id+'/suspend',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({suspended:!c.suspended})}).then(function(r){ if(r.ok){ c.suspended=!c.suspended; refreshCli(); } }); }
    else if (a==='delC') { if(!confirm('Supprimer ce client ?')) return; fetch('/api/admin/client/'+id,{method:'DELETE'}).then(function(r){ if(r.ok){ DATA.clients=DATA.clients.filter(function(x){return x.id!=id;}); draw(); } }); }
    else if (a==='delR') { if(!confirm('Supprimer cet avis ?')) return; fetch('/api/admin/rating/'+id,{method:'DELETE'}).then(function(r){ if(r.ok){ DATA.reviews=DATA.reviews.filter(function(x){return x.id!=id;}); var t=document.querySelector('#sec-rev'); if(t){ var hd=t.querySelector('.ch'); t.innerHTML=''; t.appendChild(hd); t.insertAdjacentHTML('beforeend', reviewRows()); } draw(); } }); }
  });
  function refreshShop(){ var t=document.querySelector('#sec-shop tbody'); if(t) t.innerHTML = shopRows(); }
  function refreshCli(){ var t=document.querySelector('#sec-cli tbody'); if(t) t.innerHTML = cliRows(); }
})();
</script>
</body>
</html>
