<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Templates</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-shell">
  <aside class="admin-side">
    <div class="mark" id="sideMark"><span class="logo">S</span>STUDIO</div>
    <div class="side-label">Navigation</div>
    <a class="client-row" href="/admin">Sélections</a>
    <a class="client-row" href="/admin/dashboard">Dashboard</a>
    <a class="client-row active" href="/admin/templates">Templates</a>
    <a class="client-row" href="/admin/inbox">Boîte de réception</a>
    <a class="client-row" href="/admin/portfolio">Profil public</a>
  </aside>
  <main class="admin-main" id="main"></main>
</div>
<div class="toast" id="toast"></div>
<script>
(async function(){
  const api = async (u, o={}) => { const r = await fetch(u, { headers:{'Content-Type':'application/json'}, ...o, body: o.body?JSON.stringify(o.body):undefined }); if(r.status===401){location.href='/login';throw 0;} if(!r.ok) throw new Error('err'); return r.json(); };
  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const toast = m => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); };

  const me = await api('/api/me');
  const studioName = (me.studio_name || 'STUDIO').toUpperCase();
  const logo = me.studio_logo || studioName[0] || 'S';
  document.getElementById('sideMark').innerHTML = `<span class="logo">${esc(logo)}</span>${esc(studioName)}`;
  if (me.accent_color) document.documentElement.style.setProperty('--accent', me.accent_color);

  const [tpls, clients] = await Promise.all([api('/api/templates'), api('/api/clients')]);

  document.getElementById('main').innerHTML = `
    <div class="admin-head">
      <h2>Bibliothèque de <em>templates</em></h2>
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);">${tpls.length} look${tpls.length>1?'s':''} réutilisable${tpls.length>1?'s':''}</div>
    </div>

    <div style="background:rgba(184,145,90,0.08);border:1px solid rgba(184,145,90,0.25);padding:16px;margin-bottom:20px;border-radius:2px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--ink-soft);">
      Pour ajouter un template, ouvrez une inspiration d'un client et cliquez sur « Marquer comme template » — il apparaîtra ici, réutilisable pour tous vos clients.
    </div>

    <div class="tpl-grid">
      ${tpls.length ? tpls.map(t => `
        <div class="tpl-card">
          <div class="tpl-visual">
            ${t.main_image ? `<img src="${esc(t.main_image)}">` : `<span style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);">— sans visuel —</span>`}
          </div>
          <h3>${esc(t.title || 'Look sans titre')}</h3>
          <div style="font-size:11px;color:var(--muted);">${t.pieces.length} pièce${t.pieces.length>1?'s':''}</div>
          <div class="tpl-actions">
            <select data-tpl="${t.id}" class="apply-target">
              <option value="">— appliquer à un client —</option>
              ${clients.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('')}
            </select>
            <button class="btn btn-sm" data-apply="${t.id}">Appliquer</button>
            <button class="btn btn-ghost btn-sm" data-untemplate="${t.id}">Retirer</button>
          </div>
        </div>`).join('') : '<div class="empty"><div class="e-title">Aucun template</div><div class="e-sub">Marquez une inspiration comme template depuis l\'admin.</div></div>'}
    </div>
  `;

  document.querySelectorAll('[data-apply]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.apply;
      const target = document.querySelector(`.apply-target[data-tpl="${id}"]`).value;
      if (!target) { toast('Choisissez un client.'); return; }
      await api(`/api/templates/${id}/apply`, { method: 'POST', body: { client_id: +target } });
      toast('Template appliqué.');
    });
  });
  document.querySelectorAll('[data-untemplate]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await api(`/api/inspirations/${btn.dataset.untemplate}/template`, { method: 'PUT', body: { is_template: false } });
      location.reload();
    });
  });
})();
</script>
<style>
.tpl-grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
.tpl-card { background:var(--bg-soft); border:1px solid var(--hairline); padding:18px; border-radius:2px; display:flex; flex-direction:column; gap:8px; }
.tpl-visual { aspect-ratio:3/4; background:var(--visual); overflow:hidden; position:relative; display:grid; place-items:center; }
.tpl-visual img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.tpl-card h3 { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:20px; }
.tpl-actions { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:auto; padding-top:8px; }
.tpl-actions select { flex:1; min-width:140px; padding:6px 28px 6px 10px; font-size:12px; }
</style>
</body>
</html>
