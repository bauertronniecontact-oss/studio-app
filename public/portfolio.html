<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<title>Studio — Profil public</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .pb-layout { display: grid; grid-template-columns: 1fr 400px; gap: 34px; align-items: start; }
  @media (max-width: 1000px) { .pb-layout { grid-template-columns: 1fr; } .pb-preview { position: static !important; } }
  .pb-meter { background: var(--bg-soft); border: 1px solid var(--hairline); border-radius: 4px; padding: 16px 18px; margin-bottom: 22px; }
  .pb-meter .m-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .pb-meter .m-t { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--ink-soft); }
  .pb-meter .m-pct { font-size: 22px; font-weight: 600; }
  .pb-meter .m-bar { height: 7px; background: var(--hairline); border-radius: 4px; overflow: hidden; }
  .pb-meter .m-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .pb-meter .m-hint { font-size: 12px; color: var(--muted); margin-top: 8px; font-style: italic; font-family: 'Cormorant Garamond', serif; }
  .pb-step { border: 1px solid var(--hairline); border-radius: 6px; padding: 20px 22px; margin-bottom: 16px; background: #fff; }
  .pb-step .s-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .pb-step .s-num { width: 26px; height: 26px; border-radius: 50%; background: var(--ink); color: #fff; display: grid; place-items: center; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .pb-step .s-num.done { background: var(--accent); }
  .pb-step h3 { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 400; }
  .pb-step .s-sub { font-size: 12px; color: var(--muted); }

  /* Photo drop */
  .photo-drop { display: flex; align-items: center; gap: 16px; }
  .photo-circle { width: 84px; height: 84px; border-radius: 50%; border: 2px dashed var(--hairline-strong); background: var(--bg-soft); overflow: hidden; display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: border-color .2s, background .2s; }
  .photo-circle.over { border-color: var(--accent); background: rgba(184,145,90,.08); }
  .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
  .photo-circle .ph { font-size: 24px; color: var(--muted); }
  .photo-drop .pt { font-size: 12px; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-style: italic; }

  /* Presets style */
  .presets { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .preset { font-family: 'Cormorant Garamond', serif; font-size: 13px; background: #fff; border: 1px solid var(--hairline-strong); padding: 5px 12px; border-radius: 16px; cursor: pointer; transition: all .15s; }
  .preset:hover { border-color: var(--accent); }
  .preset.on { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* Collections */
  .col-card { border: 1px solid var(--hairline); border-radius: 5px; padding: 14px; margin-bottom: 12px; background: var(--bg-soft); }
  .col-card .cc-head { display: flex; gap: 8px; margin-bottom: 8px; }
  .col-card input, .col-card textarea { width: 100%; border: 1px solid var(--hairline-strong); padding: 8px 10px; font-size: 13px; box-sizing: border-box; background: #fff; }
  .col-card .cc-del { flex-shrink: 0; background: #fff; border: 1px solid var(--hairline-strong); border-radius: 4px; cursor: pointer; padding: 0 10px; }
  .col-card .cc-del:hover { background: #b03030; color: #fff; }
  .col-drop { border: 2px dashed var(--hairline-strong); border-radius: 5px; padding: 14px; text-align: center; cursor: pointer; margin-top: 8px; font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--ink-soft); font-size: 13px; transition: background .2s, border-color .2s; }
  .col-drop.over { background: rgba(184,145,90,.08); border-color: var(--accent); }
  .col-imgs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 8px; }
  .col-imgs .ci { position: relative; aspect-ratio: 3/4; background: var(--visual); border-radius: 3px; overflow: hidden; cursor: grab; }
  .col-imgs .ci img { width: 100%; height: 100%; object-fit: cover; }
  .col-imgs .ci .rm { position: absolute; top: 3px; right: 3px; width: 19px; height: 19px; border: none; background: rgba(255,255,255,.92); border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 1; }
  .col-imgs .ci .rm:hover { background: #b03030; color: #fff; }
  .add-col { width: 100%; border: 1px dashed var(--hairline-strong); background: #fff; padding: 11px; border-radius: 5px; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--ink-soft); }
  .add-col:hover { border-color: var(--accent); color: var(--accent); }

  /* Aperçu */
  .pb-preview { position: sticky; top: 20px; }
  .pv-label { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; text-align: center; }
  .pv-card { background: #fff; border: 1px solid var(--hairline); border-radius: 8px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,.06); }
  .pv-cover { height: 110px; background: var(--visual); position: relative; }
  .pv-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; letter-spacing: .06em; padding: 3px 9px; border-radius: 12px; background: rgba(255,255,255,.92); }
  .pv-badge.pub { background: var(--accent); color: #fff; }
  .pv-photo { width: 72px; height: 72px; border-radius: 50%; border: 3px solid #fff; background: var(--bg-soft); position: absolute; left: 22px; bottom: -34px; overflow: hidden; display: grid; place-items: center; font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--muted); }
  .pv-photo img { width: 100%; height: 100%; object-fit: cover; }
  .pv-body { padding: 44px 22px 22px; }
  .pv-studio { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; }
  .pv-name { font-family: 'Cormorant Garamond', serif; color: var(--ink-soft); font-size: 15px; }
  .pv-tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: var(--ink-soft); margin-top: 10px; line-height: 1.4; }
  .pv-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .pv-tag { font-size: 10px; letter-spacing: .04em; padding: 4px 9px; border: 1px solid var(--hairline-strong); border-radius: 12px; color: var(--ink-soft); }
  .pv-col { margin-top: 16px; }
  .pv-col .pc-t { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .pv-col .pc-d { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--ink-soft); margin: 2px 0 6px; }
  .pv-col .pc-g { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .pv-col .pc-g .t { aspect-ratio: 1/1; background: var(--visual); border-radius: 2px; overflow: hidden; }
  .pv-col .pc-g .t img { width: 100%; height: 100%; object-fit: cover; }
  .pv-bio { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; margin-top: 14px; }
  .pv-empty { color: var(--muted); font-style: italic; }
  .pb-save { display: flex; gap: 12px; align-items: center; margin-top: 4px; position: sticky; bottom: 0; background: var(--bg); padding: 14px 0; }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-side">
    <div class="mark" id="sideMark"><span class="logo">S</span>STUDIO</div>
    <div class="side-label">Navigation</div>
    <a class="client-row" href="/admin">Sélections</a>
    <a class="client-row" href="/admin/dashboard">Dashboard</a>
    <a class="client-row" href="/admin/templates">Templates</a>
    <a class="client-row" href="/admin/inbox">Boîte de réception</a>
    <a class="client-row active" href="/admin/portfolio">Profil public</a>
  </aside>
  <main class="admin-main" id="main"><div style="padding:40px;text-align:center;color:var(--muted);">Chargement…</div></main>
</div>

<script>
(async function(){
  const api = async (u,o={}) => { const r=await fetch(u,{headers:{'Content-Type':'application/json'},...o,body:o.body?JSON.stringify(o.body):undefined}); if(r.status===401){location.href='/login';throw 0;} if(!r.ok) throw new Error('err'); return r.json(); };
  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const $ = s => document.querySelector(s);

  const STYLES = ['Casual','Smart casual','Streetwear','Chic','Minimaliste','Bohème','Vintage','Business','Workwear','Sportswear','Preppy','Rock','Romantique','Éclectique','Mariage','Soirée','Grande taille','Genderless','Luxe','Éco-responsable'];

  let me = await api('/api/me');
  if (me.studio_name) $('#sideMark').innerHTML = '<span class="logo">'+esc(me.studio_logo||(me.studio_name[0]||'S').toUpperCase())+'</span>'+esc(me.studio_name.toUpperCase());

  // normalise portfolio → collections [{title,desc,images[]}]
  function normCols(p){
    if (!Array.isArray(p) || !p.length) return [];
    if (typeof p[0] === 'string') return [{ title:'', desc:'', images: p.filter(Boolean) }];
    return p.map(c => ({ title:c.title||'', desc:c.desc||'', images: Array.isArray(c.images)?c.images:[] }));
  }
  let cols = normCols(me.portfolio);
  const S = {
    is_public:!!me.is_public, public_slug:me.public_slug||'', public_city:me.public_city||'',
    name:me.name||'', years_experience:me.years_experience||'', photo_url:me.photo_url||'',
    public_tagline:me.public_tagline||'', styles:(me.specialties||'').split(',').map(x=>x.trim()).filter(Boolean),
    bio:me.bio||'', studio_name:me.studio_name||''
  };

  function completeness(){
    const imgs = cols.reduce((a,c)=>a+c.images.length,0);
    const c=[ !!S.photo_url, !!S.public_tagline, !!S.public_city, S.styles.length>=1, !!S.bio, imgs>=3, cols.some(x=>x.title||x.desc), S.is_public&&!!S.public_slug ];
    return Math.round(c.filter(Boolean).length/c.length*100);
  }

  document.getElementById('main').innerHTML = `
    <div class="admin-head" style="margin-bottom:22px;">
      <div><h2 style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;">Créez votre <em>portfolio</em></h2>
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);margin-top:2px;">Tout se met à jour en direct dans l'aperçu à droite.</div></div>
      <button class="btn btn-ghost" id="openBig">Ouvrir en grand ↗</button>
    </div>
    <div class="pb-layout">
      <div>
        <div class="pb-meter"><div class="m-top"><span class="m-t">Profil complété</span><span class="m-pct" id="pct">0%</span></div>
          <div class="m-bar"><div class="m-fill" id="fill" style="width:0%"></div></div><div class="m-hint" id="hint"></div></div>

        <div class="pb-step">
          <div class="s-head"><div class="s-num" id="n1">1</div><div><h3>Vous</h3><div class="s-sub">Photo, nom, ville</div></div></div>
          <div class="photo-drop">
            <div class="photo-circle" id="photoCircle">${S.photo_url?`<img src="${esc(S.photo_url)}" onerror="this.remove()">`:'<span class="ph">+</span>'}</div>
            <div class="pt">Glissez votre photo de profil ici<br>ou cliquez sur le cercle</div>
            <input type="file" id="photoFile" accept="image/*" style="display:none;">
          </div>
          <div class="form-row" style="margin-top:14px;">
            <div class="field"><label>Votre nom</label><input data-f="name" value="${esc(S.name)}"></div>
            <div class="field"><label>Ville</label><input data-f="public_city" value="${esc(S.public_city)}" placeholder="Genève"></div>
            <div class="field"><label>Années d'expérience</label><input data-f="years_experience" type="number" min="0" max="60" value="${esc(S.years_experience)}"></div>
          </div>
        </div>

        <div class="pb-step">
          <div class="s-head"><div class="s-num" id="n2">2</div><div><h3>Votre style</h3><div class="s-sub">Choisissez les genres qui vous représentent</div></div></div>
          <div class="presets" id="presets"></div>
          <div class="field" style="margin-top:14px;"><label>Phrase d'accroche</label><input data-f="public_tagline" maxlength="120" value="${esc(S.public_tagline)}" placeholder="Le vestiaire qui vous ressemble."></div>
          <div class="field" style="margin-top:12px;"><label>Bio</label><textarea data-f="bio" rows="4" placeholder="Votre approche, ce qui vous distingue…">${esc(S.bio)}</textarea></div>
        </div>

        <div class="pb-step">
          <div class="s-head"><div class="s-num" id="n3">3</div><div><h3>Portfolio</h3><div class="s-sub">Créez des collections (ex. Mariage, Hiver…) avec un texte + des photos</div></div></div>
          <div id="colsZone"></div>
          <button class="add-col" id="addCol">+ Nouvelle collection</button>
        </div>

        <div class="pb-step">
          <div class="s-head"><div class="s-num" id="n4">4</div><div><h3>Publication</h3><div class="s-sub">Visible dans l'annuaire /discover</div></div></div>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:14px;">
            <input type="checkbox" data-f="is_public" ${S.is_public?'checked':''} style="width:18px;height:18px;">
            <span style="font-size:14px;">Rendre mon profil <strong>public</strong></span></label>
          <div class="field"><label>Adresse publique</label>
            <input data-f="public_slug" value="${esc(S.public_slug)}" placeholder="marie-dupont" pattern="[a-z0-9-]+">
            <div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;font-family:'Cormorant Garamond',serif;">${location.origin}/s/<span id="slugEcho">${esc(S.public_slug||'votre-nom')}</span></div></div>
        </div>

        <div class="pb-save"><button class="btn" id="saveBtn">Enregistrer mon portfolio</button><span id="msg" style="font-size:12px;font-family:Inter;"></span></div>
      </div>
      <div class="pb-preview"><div class="pv-label">Aperçu en direct</div><div class="pv-card" id="pv"></div></div>
    </div>`;

  // Presets
  function renderPresets(){
    $('#presets').innerHTML = STYLES.map(g=>`<span class="preset ${S.styles.indexOf(g)>=0?'on':''}" data-g="${esc(g)}">${esc(g)}</span>`).join('');
    $('#presets').querySelectorAll('.preset').forEach(el=>el.addEventListener('click',()=>{ const g=el.dataset.g; const i=S.styles.indexOf(g); if(i>=0)S.styles.splice(i,1); else S.styles.push(g); renderPresets(); update(); }));
  }

  // Champs simples
  document.querySelectorAll('[data-f]').forEach(el=>{ const f=el.dataset.f; const ev=el.type==='checkbox'?'change':'input';
    el.addEventListener(ev,()=>{ S[f]=el.type==='checkbox'?el.checked:el.value; if(f==='public_slug')$('#slugEcho').textContent=el.value||'votre-nom'; update(); }); });

  // Photo drop
  const pc=$('#photoCircle'), pf=$('#photoFile');
  async function upPhoto(file){ if(!file)return; try{ const fd=new FormData();fd.append('file',file);const r=await fetch('/api/upload',{method:'POST',body:fd});if(r.ok){const {url}=await r.json();S.photo_url=url;pc.innerHTML='<img src="'+esc(url)+'">';update();}}catch{} }
  pc.addEventListener('click',()=>pf.click());
  pf.addEventListener('change',e=>{upPhoto(e.target.files[0]);pf.value='';});
  pc.addEventListener('dragover',e=>{e.preventDefault();pc.classList.add('over');});
  pc.addEventListener('dragleave',()=>pc.classList.remove('over'));
  pc.addEventListener('drop',e=>{e.preventDefault();pc.classList.remove('over');upPhoto(e.dataTransfer.files[0]);});

  // Collections
  function renderCols(){
    const z=$('#colsZone');
    z.innerHTML = cols.map((c,ci)=>`
      <div class="col-card" data-ci="${ci}">
        <div class="cc-head"><input class="cc-title" placeholder="Titre (ex. Mariage d'automne)" value="${esc(c.title)}"><button class="cc-del" title="Supprimer">×</button></div>
        <textarea class="cc-desc" rows="2" placeholder="Décrivez cette collection : contexte, style, ce que vous avez fait…">${esc(c.desc)}</textarea>
        <div class="col-imgs">${c.images.map((u,ii)=>`<div class="ci" draggable="true" data-ii="${ii}"><img src="${esc(u)}" onerror="this.parentElement.style.display='none'"><button class="rm" data-rm="${ii}">×</button></div>`).join('')}</div>
        <div class="col-drop">Glissez des images ici, ou cliquez<input type="file" accept="image/*" multiple style="display:none;"></div>
      </div>`).join('');
    z.querySelectorAll('.col-card').forEach(card=>{
      const ci=+card.dataset.ci;
      card.querySelector('.cc-title').addEventListener('input',e=>{cols[ci].title=e.target.value;update();});
      card.querySelector('.cc-desc').addEventListener('input',e=>{cols[ci].desc=e.target.value;update();});
      card.querySelector('.cc-del').addEventListener('click',()=>{cols.splice(ci,1);renderCols();update();});
      const drop=card.querySelector('.col-drop'), fi=drop.querySelector('input');
      drop.addEventListener('click',()=>fi.click());
      fi.addEventListener('change',e=>{addImgs(ci,e.target.files);fi.value='';});
      drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
      drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
      drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');addImgs(ci,e.dataTransfer.files);});
      card.querySelectorAll('.rm').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();cols[ci].images.splice(+b.dataset.rm,1);renderCols();update();}));
      // reorder images
      let di=null;
      card.querySelectorAll('.ci').forEach(t=>{
        t.addEventListener('dragstart',ev=>{ev.stopPropagation();di=+t.dataset.ii;});
        t.addEventListener('dragover',ev=>ev.preventDefault());
        t.addEventListener('drop',ev=>{ev.preventDefault();ev.stopPropagation();const ti=+t.dataset.ii;if(di===null||di===ti)return;const it=cols[ci].images.splice(di,1)[0];cols[ci].images.splice(ti,0,it);renderCols();update();});
      });
    });
  }
  async function addImgs(ci,files){
    for(const f of Array.from(files||[])){ if(cols[ci].images.length>=12)break;
      try{const fd=new FormData();fd.append('file',f);const r=await fetch('/api/upload',{method:'POST',body:fd});if(r.ok){const {url}=await r.json();cols[ci].images.push(url);renderCols();update();}}catch{}
    }
  }
  $('#addCol').addEventListener('click',()=>{cols.push({title:'',desc:'',images:[]});renderCols();update();});

  function renderPreview(){
    const initial=((S.studio_name||S.name||'S').trim()[0]||'S').toUpperCase();
    const colsHtml = cols.filter(c=>c.images.length||c.title||c.desc).map(c=>`
      <div class="pv-col">${c.title?`<div class="pc-t">${esc(c.title)}</div>`:''}${c.desc?`<div class="pc-d">${esc(c.desc)}</div>`:''}
      ${c.images.length?`<div class="pc-g">${c.images.slice(0,6).map(u=>`<div class="t"><img src="${esc(u)}" onerror="this.remove()"></div>`).join('')}</div>`:''}</div>`).join('');
    $('#pv').innerHTML=`
      <div class="pv-cover"><div class="pv-badge ${S.is_public?'pub':''}">${S.is_public?'PUBLIC':'PRIVÉ'}</div>
        <div class="pv-photo">${S.photo_url?`<img src="${esc(S.photo_url)}" onerror="this.remove()">`:initial}</div></div>
      <div class="pv-body">
        <div class="pv-studio">${esc((S.studio_name||'Votre studio').toUpperCase())}</div>
        <div class="pv-name">${esc(S.name||'')}${S.public_city?' · '+esc(S.public_city):''}${S.years_experience?' · '+S.years_experience+' ans':''}</div>
        <div class="pv-tagline ${S.public_tagline?'':'pv-empty'}">${S.public_tagline?'"'+esc(S.public_tagline)+'"':'Votre accroche apparaîtra ici'}</div>
        ${S.styles.length?`<div class="pv-tags">${S.styles.slice(0,8).map(t=>`<span class="pv-tag">${esc(t)}</span>`).join('')}</div>`:''}
        ${colsHtml||'<div class="pv-bio pv-empty" style="margin-top:14px">Ajoutez une collection avec des photos.</div>'}
        <div class="pv-bio ${S.bio?'':'pv-empty'}">${S.bio?esc(S.bio):'Votre bio apparaîtra ici.'}</div>
      </div>`;
  }

  function update(){
    renderPreview();
    const p=completeness(); $('#pct').textContent=p+'%'; $('#fill').style.width=p+'%';
    const imgs=cols.reduce((a,c)=>a+c.images.length,0);
    $('#n1').classList.toggle('done',!!S.photo_url&&!!S.public_city);
    $('#n2').classList.toggle('done',S.styles.length>0&&!!S.public_tagline&&!!S.bio);
    $('#n3').classList.toggle('done',imgs>=3&&cols.some(c=>c.title||c.desc));
    $('#n4').classList.toggle('done',S.is_public&&!!S.public_slug);
    const h=[]; if(!S.photo_url)h.push('une photo'); if(imgs<3)h.push('au moins 3 photos'); if(!S.styles.length)h.push('votre style'); if(S.is_public&&!S.public_slug)h.push('une adresse');
    $('#hint').textContent = h.length?'Pour compléter : '+h.slice(0,2).join(', ')+'.':'✓ Votre portfolio est complet !';
  }

  $('#openBig').addEventListener('click',()=>{
    if(!S.public_slug){ alert('Enregistrez d\'abord votre portfolio avec une adresse publique.'); return; }
    if(!S.is_public){ if(!confirm('Votre profil n\'est pas encore public — la page ne sera pas visible. Continuer ?')) return; }
    window.open('/s/'+S.public_slug, '_blank');
  });

  async function save(){
    const msg=$('#msg');
    const slug=(S.public_slug||'').toLowerCase().replace(/[^a-z0-9-]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    if(S.is_public&&!slug){msg.textContent='✗ Ajoutez une adresse pour être visible.';msg.style.color='#b03030';return;}
    const body={ is_public:S.is_public, public_slug:slug, public_city:S.public_city, name:S.name, years_experience:S.years_experience?parseInt(S.years_experience,10):null, photo_url:S.photo_url, public_tagline:S.public_tagline, specialties:S.styles.join(', '), bio:S.bio, portfolio:cols.filter(c=>c.images.length||c.title||c.desc) };
    $('#saveBtn').disabled=true; msg.textContent='Enregistrement…'; msg.style.color='var(--muted)';
    try{ me=await api('/api/me/settings',{method:'PUT',body}); cols=normCols(me.portfolio); S.public_slug=me.public_slug||slug; msg.textContent='✓ Enregistré.'; msg.style.color='var(--accent)'; renderCols(); }
    catch(e){ msg.textContent='✗ Erreur (adresse déjà prise ?)'; msg.style.color='#b03030'; }
    $('#saveBtn').disabled=false;
  }
  $('#saveBtn').addEventListener('click',save);

  renderPresets(); renderCols(); update();
})();
</script>
</body>
</html>
