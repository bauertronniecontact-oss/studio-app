<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Styliste</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="/discover" class="mark" style="text-decoration:none;"><span class="logo">S</span>STUDIO</a>
    <nav>
      <a href="/discover">← Annuaire</a>
    </nav>
    <div class="topbar-icons">
      <a href="/c/login" class="auth-pill auth-pill-primary">Espace client</a>
    </div>
  </div>
</div>

<main id="main" style="padding:60px 0;">
  <div style="text-align:center;color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;">Chargement…</div>
</main>

<footer>
  <div class="container">
    <div class="f-mark">STUDIO</div>
  </div>
</footer>

<style>
.sh-hero {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 36px;
  align-items: center;
  padding: 40px 0 60px;
  border-bottom: 1px solid var(--hairline);
  margin-bottom: 60px;
}
@media (max-width: 720px) {
  .sh-hero { grid-template-columns: 1fr; }
  .sh-photo { width: 160px; height: 160px; margin: 0 auto; }
}
.sh-photo {
  width: 220px; height: 220px;
  border-radius: 50%;
  background: var(--visual);
  position: relative; overflow: hidden;
  box-shadow: 0 8px 28px rgba(17,17,17,0.10);
}
.sh-photo img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.sh-photo-init {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 90px; font-style: italic;
  color: rgba(17,17,17,0.25);
}
.sh-meta {
  font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.sh-meta strong { color: var(--ink); }
.sh-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: clamp(36px, 5vw, 56px);
  line-height: 1.05;
  letter-spacing: -0.01em;
}
.sh-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--ink-soft);
  margin-top: 8px;
}
.sh-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 19px;
  color: var(--ink-soft);
  line-height: 1.5;
  margin-top: 20px;
  max-width: 540px;
}
.sh-tags {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 22px;
}
.sh-tag {
  font-size: 11px; letter-spacing: 0.06em;
  padding: 6px 14px;
  border-radius: 999px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  color: var(--ink-soft);
}

.sh-section {
  padding: 0 0 60px;
}
.sh-section h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 30px;
  letter-spacing: -0.005em;
  margin-bottom: 8px;
}
.sh-section .lbl {
  font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px;
}
.sh-bio {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  line-height: 1.7;
  color: var(--ink-soft);
  max-width: 720px;
  white-space: pre-wrap;
}
.sh-portfolio {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-top: 20px;
}
@media (max-width: 900px) { .sh-portfolio { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 560px) { .sh-portfolio { grid-template-columns: repeat(2, 1fr); } }
.sh-portfolio .tile {
  aspect-ratio: 1/1;
  background: var(--visual);
  position: relative; overflow: hidden;
  cursor: zoom-in;
}
.sh-portfolio .tile img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.sh-portfolio .tile:hover img { transform: scale(1.04); }

/* Avis clients */
.sh-reviews { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 10px; }
@media (max-width: 700px) { .sh-reviews { grid-template-columns: 1fr; } }
.sh-review { background: var(--bg-soft); border: 1px solid var(--hairline); padding: 16px 18px; border-radius: 3px; }
.sh-review .rv-stars { color: var(--accent); letter-spacing: 2px; font-size: 14px; margin-bottom: 8px; }
.sh-review .rv-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--ink-soft); line-height: 1.5; }
.sh-review .rv-author { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.08em; color: var(--muted); margin-top: 10px; }

/* Widget de notation */
.rate-widget { background: rgba(184,145,90,0.06); border: 1px solid rgba(184,145,90,0.25); padding: 18px; border-radius: 4px; margin-bottom: 22px; }
.rate-widget .rw-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--ink-soft); margin-bottom: 10px; }
.rate-widget .rw-stars { display: flex; gap: 4px; margin-bottom: 12px; }
.rate-widget .rw-star { background: none; border: none; font-size: 30px; line-height: 1; cursor: pointer; color: var(--hairline-strong); transition: color .15s, transform .1s; padding: 0; }
.rate-widget .rw-star:hover { transform: scale(1.12); }
.rate-widget .rw-star.on { color: var(--accent); }
.rate-widget .rw-text { width: 100%; box-sizing: border-box; border: 1px solid var(--hairline-strong); padding: 10px 12px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; resize: vertical; margin-bottom: 12px; }
.rate-widget .rw-submit { font-size: 12px; }
.rate-widget .rw-msg { font-size: 12px; margin-top: 10px; font-family: 'Inter', sans-serif; }

.sh-cta-section {
  background: var(--bg-soft);
  padding: 60px 0;
  margin-top: 40px;
  border-top: 1px solid var(--hairline);
}
.sh-cta-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 60px;
  align-items: center;
}
@media (max-width: 820px) { .sh-cta-grid { grid-template-columns: 1fr; gap: 30px; } }
.sh-cta-text h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400; font-size: 36px; line-height: 1.1;
  letter-spacing: -0.01em;
}
.sh-cta-text p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 16px;
  color: var(--ink-soft);
  line-height: 1.55;
  margin-top: 14px;
  max-width: 420px;
}

.sh-form { background:#fff; padding:28px; border:1px solid var(--hairline); border-radius:4px; }
.sh-form .field { margin-bottom: 14px; }

.sh-success {
  background: rgba(184,145,90,0.08);
  border: 1px solid rgba(184,145,90,0.3);
  padding: 28px;
  border-radius: 4px;
  text-align: center;
}
.sh-success h3 { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:24px; margin-bottom:14px; }
.sh-success p { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:var(--ink-soft); margin-bottom:20px; line-height:1.6; }
.sh-success .link-box {
  display: flex; gap: 8px; align-items: stretch;
}
.sh-success input {
  flex: 1; padding: 10px 12px;
  font-family: monospace; font-size: 12px;
  border: 1px solid var(--hairline-strong);
  border-radius: 2px;
  background: var(--bg-soft);
}
</style>

<script>
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const starsHtml = (avg) => { const f = Math.round(avg||0); let o=''; for(let i=1;i<=5;i++) o+=`<span style="color:${i<=f?'var(--accent)':'var(--hairline-strong)'};">★</span>`; return o; };

(async function(){
  const slug = location.pathname.split('/').filter(Boolean)[1];
  const main = document.getElementById('main');
  let s;
  try {
    s = await fetch(`/api/shoppers/${slug}`).then(r => { if (!r.ok) throw 0; return r.json(); });
  } catch {
    main.innerHTML = `<div style="text-align:center;padding:80px 32px;font-family:'Cormorant Garamond',serif;font-style:italic;">Ce styliste n'existe pas ou n'a pas encore activé son profil public.</div>`;
    return;
  }

  document.title = `${s.studio_name || s.name || 'Styliste'} — Studio`;
  if (s.accent_color) document.documentElement.style.setProperty('--accent', s.accent_color);

  const portfolio = Array.isArray(s.portfolio) ? s.portfolio.filter(Boolean) : [];
  const initial = ((s.studio_name || s.name || '?').trim().charAt(0) || 'S').toUpperCase();
  const specs = (s.specialties || '').split(',').map(x=>x.trim()).filter(Boolean);

  main.innerHTML = `
    <section class="section">
      <div class="container">
        <div class="sh-hero">
          <div class="sh-photo">
            ${s.photo_url ? `<img src="${esc(s.photo_url)}" alt="" onerror="this.remove();this.parentElement.innerHTML='<span class=\\'sh-photo-init\\'>${esc(initial)}</span>';">` : `<span class="sh-photo-init">${esc(initial)}</span>`}
          </div>
          <div>
            <div class="sh-meta">
              ${s.public_city ? `<strong>${esc(s.public_city)}</strong>` : ''}
              ${s.public_city && s.years_experience ? ' &nbsp;·&nbsp; ' : ''}
              ${s.years_experience ? `${s.years_experience} an${s.years_experience>1?'s':''} d'expérience` : ''}
            </div>
            <div class="sh-title">${esc((s.studio_name || s.name || 'Studio').toUpperCase())}</div>
            ${s.name ? `<div class="sh-name">— ${esc(s.name)}</div>` : ''}
            ${s.public_tagline ? `<div class="sh-tagline">"${esc(s.public_tagline)}"</div>` : ''}
            ${s.rating_count ? `<div class="sh-rating-sum" style="margin-top:10px;font-size:16px;letter-spacing:2px;">${starsHtml(s.rating_avg)} <span style="font-size:13px;color:var(--muted);letter-spacing:normal;font-family:'Inter',sans-serif;">${s.rating_avg.toFixed(1)} sur 5 · ${s.rating_count} avis</span></div>` : ''}
            ${specs.length ? `<div class="sh-tags">${specs.map(t => `<span class="sh-tag">${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
        </div>

        ${s.bio ? `
          <div class="sh-section">
            <div class="lbl">À propos</div>
            <div class="sh-bio">${esc(s.bio)}</div>
          </div>` : ''}

        ${portfolio.length ? `
          <div class="sh-section">
            <div class="lbl">Portfolio</div>
            <h2>Mon <em>univers</em></h2>
            <div class="sh-portfolio">
              ${portfolio.map(u => `<div class="tile"><img src="${esc(u)}" alt="" onerror="this.parentElement.remove();"></div>`).join('')}
            </div>
          </div>` : ''}

        ${(s.reviews && s.reviews.length) || s.can_rate ? `
          <div class="sh-section">
            <div class="lbl">Avis</div>
            <h2>Ce qu'en disent les <em>clients</em></h2>
            ${s.can_rate ? '<div id="rateZone"></div>' : ''}
            ${(s.reviews && s.reviews.length) ? `
              <div class="sh-reviews">
                ${s.reviews.map(r => `
                  <div class="sh-review">
                    <div class="rv-stars">${starsHtml(r.stars)}</div>
                    <div class="rv-text">${esc(r.review)}</div>
                    <div class="rv-author">— ${esc(r.author)}</div>
                  </div>`).join('')}
              </div>` : (s.can_rate ? '' : '<div style="font-family:Cormorant Garamond,serif;font-style:italic;color:var(--muted);">Pas encore d\'avis.</div>')}
          </div>` : ''}
      </div>
    </section>

    <section class="sh-cta-section">
      <div class="container">
        <div class="sh-cta-grid">
          <div class="sh-cta-text">
            <div class="lbl">Démarrer</div>
            <h2>Travailler avec <em>${esc(s.studio_name || s.name || 'moi')}</em></h2>
            <p>Laissez-moi un mot, je vous enverrai un lien personnel vers votre espace privé pour débuter votre sélection sur mesure.</p>
          </div>
          <div id="formZone">
            <form class="sh-form" id="reqForm">
              <div class="field">
                <label>Votre nom *</label>
                <input name="name" required autocomplete="name">
              </div>
              <div class="field">
                <label>Email *</label>
                <input name="email" type="email" required autocomplete="email">
              </div>
              <div class="field">
                <label>Quelques mots (optionnel)</label>
                <textarea name="message" rows="3" placeholder="Vos attentes, occasion, style recherché…"></textarea>
              </div>
              <button class="btn" type="submit" style="width:100%;">Demander mon accès</button>
              <div class="err" id="err" style="display:none;margin-top:10px;"></div>
            </form>
          </div>
        </div>
      </div>
    </section>
  `;

  // Widget de notation (client connecté = client de ce styliste)
  if (s.can_rate) {
    const zone = document.getElementById('rateZone');
    let picked = s.my_rating ? s.my_rating.stars : 0;
    const renderRate = () => {
      zone.innerHTML = `
        <div class="rate-widget">
          <div class="rw-label">${s.my_rating ? 'Modifier votre avis' : 'Vous avez travaillé ensemble ? Laissez votre avis'}</div>
          <div class="rw-stars">${[1,2,3,4,5].map(i => `<button type="button" class="rw-star ${i<=picked?'on':''}" data-v="${i}">★</button>`).join('')}</div>
          <textarea class="rw-text" rows="3" placeholder="Votre expérience avec ce styliste…">${esc(s.my_rating?.review || '')}</textarea>
          <button class="btn rw-submit" type="button">${s.my_rating ? 'Mettre à jour' : 'Publier mon avis'}</button>
          <div class="rw-msg" style="display:none;"></div>
        </div>`;
      zone.querySelectorAll('.rw-star').forEach(b => b.addEventListener('click', () => { picked = +b.dataset.v; renderRate(); }));
      zone.querySelector('.rw-submit').addEventListener('click', async () => {
        const msg = zone.querySelector('.rw-msg');
        if (!picked) { msg.textContent = 'Choisissez une note.'; msg.style.color = '#b03030'; msg.style.display='block'; return; }
        const review = zone.querySelector('.rw-text').value;
        const r = await fetch(`/api/shoppers/${slug}/rate`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ stars: picked, review }) });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { msg.textContent = d.error || 'Erreur'; msg.style.color = '#b03030'; msg.style.display='block'; return; }
        msg.textContent = '✓ Merci, votre avis est publié.'; msg.style.color = 'var(--accent)'; msg.style.display='block';
        setTimeout(() => location.reload(), 900);
      });
    };
    renderRate();
  }

  const reqForm = document.getElementById('reqForm');
  if (reqForm) reqForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target).entries());
    const err = document.getElementById('err');
    err.style.display = 'none';
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Envoi…';
    const r = await fetch(`/api/shoppers/${slug}/request`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(fd)
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) {
      err.textContent = d.error || 'Erreur';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Demander mon accès';
      return;
    }
    document.getElementById('formZone').innerHTML = `
      <div class="sh-success">
        <h3>✓ Demande envoyée</h3>
        <p>${esc(d.message || '')}<br><br>Cliquez sur le lien ci-dessous pour entrer dans votre espace, ou copiez-le pour y revenir plus tard.</p>
        <div class="link-box">
          <input value="${esc(d.magic_url)}" readonly id="magicLink">
          <button class="btn" type="button" id="goBtn">Entrer</button>
        </div>
      </div>`;
    document.getElementById('goBtn').addEventListener('click', () => { location.href = d.magic_url; });
  });
})();
</script>
</body>
</html>
