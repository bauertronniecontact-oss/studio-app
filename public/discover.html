<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Trouvez votre styliste</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="mark"><span class="logo">S</span>STUDIO</div>
    <nav>
      <a href="/discover" style="color:var(--ink);font-weight:600;">Stylistes</a>
    </nav>
    <div class="topbar-icons">
      <a href="/login" class="auth-pill">Espace styliste</a>
      <a href="/c/login" class="auth-pill auth-pill-primary">Espace client</a>
    </div>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="hero" style="text-align:center;padding:80px 0 50px;">
      <div style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;">L'annuaire</div>
      <h1 style="max-width:none;">Trouvez le <em>styliste</em> qui vous ressemble.</h1>
      <p style="max-width:560px;margin:22px auto 0;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);font-size:17px;line-height:1.55;">
        Parcourez les profils, découvrez leurs univers, et choisissez celui ou celle qui correspondra à vos goûts.
      </p>
    </div>

    <div id="styleFilter" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:34px;"></div>

    <div id="grid" class="shoppers-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;">Chargement…</div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="f-mark">STUDIO</div>
    <div class="f-meta">Personal Shopping</div>
  </div>
</footer>

<style>
.shoppers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 28px;
  padding-bottom: 60px;
}
.shopper-card {
  background: #fff;
  border: 1px solid var(--hairline);
  border-radius: 4px;
  overflow: hidden;
  text-decoration: none;
  color: var(--ink);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  display: flex; flex-direction: column;
}
.shopper-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 36px rgba(17,17,17,0.10);
  border-color: var(--hairline-strong);
}
.sc-portfolio {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--visual);
  aspect-ratio: 16/10;
  position: relative;
  overflow: hidden;
}
.sc-portfolio .tile {
  background: var(--visual-2);
  position: relative;
  overflow: hidden;
}
.sc-portfolio .tile img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.sc-portfolio.no-img::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(135deg, transparent 0 22px, rgba(17,17,17,0.04) 22px 23px);
}
.sc-body {
  padding: 22px;
  display: flex; flex-direction: column; gap: 6px;
  flex: 1;
}
.sc-head { display: flex; align-items: center; gap: 12px; }
.sc-photo {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--visual);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.sc-photo img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.sc-photo-init {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-style: italic;
  color: rgba(17,17,17,0.4);
}
.sc-name-block { min-width: 0; }
.sc-studio {
  font-family: 'Inter', sans-serif;
  font-weight: 700; font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink);
}
.sc-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--muted);
  font-size: 13px;
  margin-top: 2px;
}
.sc-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; line-height: 1.3;
  color: var(--ink);
  margin-top: 10px;
}
.sc-bio {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 14px;
  line-height: 1.5;
  margin-top: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sc-meta {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: auto;
  padding-top: 14px;
}
.sc-tag {
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.04em;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  color: var(--ink-soft);
}
.sc-cta {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--hairline);
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--ink);
  display: inline-flex; align-items: center; gap: 6px;
}
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 32px;
  color: var(--muted);
  border: 1px dashed var(--hairline-strong);
  font-family: 'Cormorant Garamond', serif;
}
.empty-state .et { font-size: 24px; color: var(--ink-soft); margin-bottom: 8px; }
.empty-state .es { font-style: italic; font-size: 14px; }
</style>

<script>
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const flatImages = p => { if(!Array.isArray(p)) return []; if(!p.length) return []; if(typeof p[0]==='string') return p.filter(Boolean); return p.reduce((a,c)=>a.concat(Array.isArray(c.images)?c.images:[]),[]).filter(Boolean); };

const stars = (avg) => {
  const full = Math.round(avg || 0);
  let out = '';
  for (let i=1;i<=5;i++) out += `<span style="color:${i<=full?'var(--accent)':'var(--hairline-strong)'};">★</span>`;
  return out;
};

(async function(){
  const grid = document.getElementById('grid');
  const shoppers = await fetch('/api/discover').then(r => r.json());

  if (!shoppers.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="et">Aucun styliste public pour le moment.</div>
      <div class="es">Revenez bientôt — ou inscrivez-vous comme styliste pour rejoindre l'annuaire.</div>
    </div>`;
    return;
  }

  // Filtre par style (spécialités agrégées)
  const allStyles = [...new Set(shoppers.flatMap(s => (s.specialties||'').split(',').map(x=>x.trim()).filter(Boolean)))].sort();
  let activeStyle = null;
  const fbar = document.getElementById('styleFilter');
  const chip = (label, val) => `<button class="style-chip ${activeStyle===val?'on':''}" data-style="${val==null?'':esc(val)}">${esc(label)}</button>`;
  function renderFilter(){
    fbar.innerHTML = chip('Tous', null) + allStyles.map(st => chip(st, st)).join('');
    fbar.querySelectorAll('[data-style]').forEach(b => b.addEventListener('click', () => {
      activeStyle = b.dataset.style || null; renderFilter(); renderGrid();
    }));
  }

  function renderGrid(){
    const list = activeStyle
      ? shoppers.filter(s => (s.specialties||'').toLowerCase().includes(activeStyle.toLowerCase()))
      : shoppers;
    grid.innerHTML = list.map(s => {
    const portfolio = flatImages(s.portfolio).slice(0, 4);
    const initial = ((s.studio_name || s.name || '?').trim().charAt(0) || 'S').toUpperCase();
    const specs = (s.specialties || '').split(',').map(x=>x.trim()).filter(Boolean);
    return `
      <a class="shopper-card" href="/s/${esc(s.public_slug)}">
        <div class="sc-portfolio ${portfolio.length ? '' : 'no-img'}">
          ${portfolio.length
            ? portfolio.slice(0,4).map(u => `<div class="tile"><img src="${esc(u)}" alt="" onerror="this.remove();"></div>`).join('') + (portfolio.length < 4 ? Array(4-portfolio.length).fill('<div class="tile"></div>').join('') : '')
            : ''}
        </div>
        <div class="sc-body">
          <div class="sc-head">
            <div class="sc-photo">
              ${s.photo_url ? `<img src="${esc(s.photo_url)}" alt="" onerror="this.remove();this.parentElement.innerHTML='<span class=\\'sc-photo-init\\'>${esc(initial)}</span>';">` : `<span class="sc-photo-init">${esc(initial)}</span>`}
            </div>
            <div class="sc-name-block">
              <div class="sc-studio">${esc((s.studio_name || 'Studio').toUpperCase())}</div>
              ${s.name ? `<div class="sc-name">${esc(s.name)}${s.public_city ? ' · ' + esc(s.public_city) : ''}</div>` : (s.public_city ? `<div class="sc-name">${esc(s.public_city)}</div>` : '')}
              ${s.rating_count ? `<div class="sc-rating" style="font-size:12px;margin-top:3px;letter-spacing:1px;">${stars(s.rating_avg)} <span style="color:var(--muted);letter-spacing:normal;">${s.rating_avg.toFixed(1)} · ${s.rating_count} avis</span></div>` : `<div class="sc-rating" style="font-size:11px;margin-top:3px;color:var(--muted);font-style:italic;font-family:'Cormorant Garamond',serif;">Pas encore d'avis</div>`}
            </div>
          </div>
          ${s.public_tagline ? `<div class="sc-tagline">${esc(s.public_tagline)}</div>` : ''}
          ${s.bio ? `<div class="sc-bio">${esc(s.bio)}</div>` : ''}
          ${specs.length ? `<div class="sc-meta">${specs.slice(0,4).map(sp => `<span class="sc-tag">${esc(sp)}</span>`).join('')}${s.years_experience ? `<span class="sc-tag">${s.years_experience} an${s.years_experience>1?'s':''}</span>` : ''}</div>` : (s.years_experience ? `<div class="sc-meta"><span class="sc-tag">${s.years_experience} an${s.years_experience>1?'s':''}</span></div>` : '')}
          <div class="sc-cta">Découvrir →</div>
        </div>
      </a>`;
    }).join('') || '<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);font-family:Cormorant Garamond,serif;font-style:italic;">Aucun styliste pour ce style.</div>';
  }

  renderFilter();
  renderGrid();
})();
</script>
<style>
.style-chip {
  font-family: 'Cormorant Garamond', serif; font-size: 14px;
  background: #fff; color: var(--ink); border: 1px solid var(--hairline-strong);
  padding: 7px 16px; border-radius: 18px; cursor: pointer;
  transition: background .2s, color .2s, border-color .2s, transform .15s;
}
.style-chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-1px); }
.style-chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
</style>
</body>
</html>
