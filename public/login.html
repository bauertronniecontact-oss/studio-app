<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Connexion</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-wrap">
  <form class="login-card" id="loginForm">
    <div class="logo-wrap"><div class="logo">S</div></div>
    <h1>Studio</h1>
    <div class="sub">Espace personal shopper</div>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required autocomplete="email">
    </div>
    <div class="field" style="margin-top:14px;">
      <label>Mot de passe</label>
      <input type="password" name="password" required autocomplete="current-password">
    </div>
    <button class="btn" type="submit">Se connecter</button>
    <div class="err" id="err" style="display:none;"></div>

    <div class="alt-links">
      <span>Nouveau personal shopper ?</span>
      <a href="/signup">Créer un compte</a>
    </div>
  </form>
</div>
<style>
.alt-links {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid var(--hairline);
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  color: var(--muted);
}
.alt-links a {
  margin-left: 6px;
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 3px;
  font-style: italic;
}
.alt-links a:hover { color: var(--accent); }
</style>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const err = document.getElementById('err');
  err.style.display = 'none';
  const r = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.fromEntries(fd.entries()))
  });
  if (r.ok) location.href = '/admin';
  else {
    const d = await r.json().catch(()=>({}));
    err.textContent = d.error || 'Connexion impossible.';
    err.style.display = 'block';
  }
});
</script>
</body>
</html>
